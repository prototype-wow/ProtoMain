<!-- PROTOTYPE · US-Quel'Thalas — Registro de Carries (multiusuario, roles, auditoría) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; form-action 'self'; script-src 'self' 'sha256-iFo6XSKhn5Z3f8i8qNpy1HoEw37g19kj/mHMoer0RBU='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://hjatxlvqytgkizcaopce.supabase.co http://localhost:3000 http://127.0.0.1:3000 https://*.trycloudflare.com">
<title>PROTOTYPE · Registro de Carries</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg:#06080b; --bg-1:#0c1116; --bg-2:#121a21; --bg-3:#19242d;
    --line:#1f2c36; --line-soft:#161f27;
    --blue:#009BDB; --blue-2:#33b6e8; --blue-dim:#0a6e9b;
    --white:#ffffff; --text:#e7eef4; --muted:#8a9caa; --muted-2:#566671;
    --gold:#f0c14b; --ok:#2fbf71; --warn:#e8a13a; --rose:#e8556b; --purple:#9b7be8;
    --font-display:'Montserrat',system-ui,sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
    --font-mono:'Space Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-body); color:var(--text);
    background:radial-gradient(800px 460px at 88% -12%, rgba(0,155,219,.16), transparent 60%),radial-gradient(620px 460px at -5% 108%, rgba(0,155,219,.07), transparent 55%),var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.45;}
  .wrap{max-width:1680px; margin:0 auto; padding:20px clamp(12px,3vw,34px) 70px}

  header.top{display:flex; flex-wrap:wrap; gap:14px 20px; align-items:center; justify-content:space-between; padding-bottom:16px; border-bottom:1px solid var(--line-soft)}
  .brand{display:flex; align-items:center; gap:14px}
  .brand img{width:50px; height:50px; display:block; filter:drop-shadow(0 3px 10px rgba(0,155,219,.35))}
  .brand .txt h1{font-family:var(--font-display); font-weight:700; letter-spacing:.34em; text-transform:uppercase; font-size:clamp(17px,2.4vw,23px); margin:0; line-height:1}
  .brand .txt p{margin:5px 0 0; color:var(--muted); font-size:11px; letter-spacing:.22em; text-transform:uppercase; font-weight:500}
  .brand .txt p b{color:var(--blue); font-weight:600}
  .hright{display:flex; align-items:center; gap:12px}
  .live{display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted-2); font-family:var(--font-mono)}
  .live .dot{width:8px; height:8px; border-radius:50%; background:var(--muted-2); transition:.2s}
  .live.ok .dot{background:var(--ok); box-shadow:0 0 8px var(--ok)}
  .live.err .dot{background:var(--rose); box-shadow:0 0 8px var(--rose)}
  .live.pulse .dot{animation:pulse .6s ease}
  @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.7)}100%{transform:scale(1)}}

  .userchip{display:flex; align-items:center; gap:9px; border:1px solid var(--line); border-radius:10px; padding:6px 11px; cursor:pointer; background:var(--bg-1); transition:.15s}
  .userchip:hover{border-color:var(--blue)}
  .userchip .nm{font-weight:600; font-size:13px}
  .rbadge{font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:2px 7px; border-radius:20px}
  .rbadge.basico{color:var(--muted); background:rgba(138,156,170,.12); border:1px solid var(--line)}
  .rbadge.cargador{color:var(--blue); background:rgba(0,155,219,.12); border:1px solid var(--blue-dim)}
  .rbadge.officer{color:var(--purple); background:rgba(155,123,232,.13); border:1px solid rgba(155,123,232,.4)}
  .rbadge.admin{color:var(--gold); background:rgba(240,193,75,.12); border:1px solid rgba(240,193,75,.4)}

  /* class / role glyphs — viven en el mismo motivo de diamante que .pip/.dia */
  .rolebadge{width:21px; height:21px; flex:none; display:inline-flex; align-items:center; justify-content:center; transform:rotate(45deg); border-radius:5px; border:1px solid var(--cc,var(--line)); background:linear-gradient(160deg,color-mix(in srgb,var(--cc,var(--muted)) 16%,var(--bg-2)),var(--bg-2)); box-shadow:0 0 7px -3px var(--cc,transparent); position:relative}
  .rolebadge svg{width:12px; height:12px; transform:rotate(-45deg); color:var(--cc,var(--muted)); overflow:visible}
  .classbadge{width:22px; height:22px; flex:none; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; border:2px solid var(--cc,var(--line)); box-shadow:0 0 6px -2px var(--cc,transparent); overflow:hidden; background:var(--bg-2)}
  .classbadge img{width:100%; height:100%; object-fit:cover; display:block}
  .rolebadge.role-tank{--cc:var(--blue)}
  .rolebadge.role-healer{--cc:var(--ok)}
  .rolebadge.role-ranged,.rolebadge.role-melee{--cc:var(--rose)}
  .classrow{display:inline-flex; align-items:center; gap:9px}
  .classname{color:var(--cc,var(--text)); font-weight:600}
  td.classcell{border-left:3px solid var(--cc,transparent)}

  .btn{font-family:var(--font-body); font-weight:600; font-size:13px; cursor:pointer; border-radius:9px; padding:9px 15px; border:1px solid var(--line); background:var(--bg-2); color:var(--text); transition:.15s; white-space:nowrap}
  .btn:hover{border-color:var(--blue); background:var(--bg-3)}
  .btn.primary{border-color:transparent; color:#021018; font-weight:700; background:linear-gradient(120deg,#2bb6e8,#009BDB); box-shadow:0 6px 20px -8px rgba(0,155,219,.8)}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:7px 11px; font-size:12px}
  .btn.danger:hover{border-color:var(--rose); color:var(--rose)}
  .iconbtn{width:38px; height:38px; border-radius:9px; border:1px solid var(--line); cursor:pointer; background:var(--bg-2); color:var(--text); font-size:17px; display:grid; place-items:center; transition:.15s}
  .iconbtn:hover{border-color:var(--blue); color:var(--blue); background:var(--bg-3)}
  .iconbtn:disabled{opacity:.32; cursor:not-allowed}
  .actions{display:flex; gap:9px; flex-wrap:wrap}

  .tabs{display:flex; gap:6px; margin:18px 0 4px; border-bottom:1px solid var(--line-soft); flex-wrap:wrap}
  .tab{font-family:var(--font-display); font-weight:600; font-size:12.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); padding:11px 16px; cursor:pointer; border-bottom:2px solid transparent; transition:.15s; display:flex; align-items:center; gap:8px}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--white); border-color:var(--blue)}
  .tab .dia{width:7px; height:7px; transform:rotate(45deg); background:var(--blue); opacity:0; transition:.15s}
  .tab.on .dia{opacity:1}

  .banner{display:none; margin:16px 0 0; padding:12px 16px; border-radius:11px; border:1px solid var(--rose); background:rgba(232,85,107,.1); color:#ffd9df; font-size:13px}
  .banner.on{display:block}
  .banner code{font-family:var(--font-mono); color:#fff}

  .wbar{display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; margin:16px 0 4px}
  .weeknav{display:flex; align-items:center; gap:8px}
  .weeknav .wk{min-width:180px; text-align:center; padding:8px 14px; border:1px solid var(--line); border-radius:10px; background:var(--bg-1)}
  .weeknav .wk .lbl{font-weight:600; font-size:14px}
  .weeknav .wk .dt{font-size:11px; color:var(--muted-2); font-family:var(--font-mono)}
  .weeknav .wkside{min-width:115px; max-width:155px; text-align:center; padding:7px 10px; border:1px solid var(--line-soft); border-radius:10px; background:transparent; cursor:pointer; opacity:.55; transition:.15s}
  .weeknav .wkside:hover{opacity:1; border-color:var(--blue); background:var(--bg-1)}
  .weeknav .wkside .lbl{font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .weeknav .wkside .dt{font-size:10px; color:var(--muted-2); font-family:var(--font-mono)}
  .weeknav .wkside.empty{cursor:default; opacity:.25; border-style:dashed; color:var(--muted-2)}
  .weeknav .wkside.empty:hover{border-color:var(--line-soft); background:transparent}
  .qadd{width:27px; height:27px; border-radius:8px; border:1px solid var(--line); background:var(--bg-2); color:var(--blue); font-size:17px; line-height:1; cursor:pointer; flex:none; margin-left:4px; transition:.15s}
  .qadd:hover{border-color:var(--blue); background:var(--bg-3); transform:scale(1.06)}
  .tag.run{color:#9fe3c0; border-color:#1d4a37}

  .summary{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin:16px 0 8px}
  .stat{border:1px solid var(--line-soft); border-radius:12px; padding:13px 15px; background:var(--bg-1); position:relative; overflow:hidden}
  .stat::after{content:""; position:absolute; right:-10px; top:-10px; width:26px; height:26px; transform:rotate(45deg); background:rgba(0,155,219,.08)}
  .stat .k{font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted-2)}
  .stat .v{font-family:var(--font-mono); font-weight:700; font-size:19px; margin-top:4px}
  .stat .v.gold{color:var(--gold)} .stat .v.blue{color:var(--blue)} .stat .v.ok{color:var(--ok)} .stat .v.warn{color:var(--warn)}

  .raids{display:grid; grid-template-columns:1.15fr 1fr; gap:18px; margin-top:14px; align-items:start}
  .panel{border:1px solid var(--line-soft); border-radius:14px; background:var(--bg-1); overflow:hidden}
  .phead{padding:14px 18px 12px; border-bottom:1px solid var(--line-soft); position:relative}
  .phead::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--blue)}
  .panel.chimaerus .phead::before{background:linear-gradient(var(--white),var(--blue))}
  .phead h2{font-family:var(--font-display); font-weight:700; letter-spacing:.14em; text-transform:uppercase; font-size:15px; margin:0; display:flex; align-items:center; gap:9px}
  .phead h2 .dia{width:9px; height:9px; transform:rotate(45deg); background:var(--blue)}
  .phead .sub{color:var(--muted); font-size:11.5px; margin-top:3px; font-family:var(--font-mono)}
  .phead .rtot{position:absolute; right:18px; top:14px; text-align:right}
  .phead .rtot b{font-family:var(--font-mono); color:var(--gold); font-size:15px}
  .phead .rtot span{display:block; font-size:9.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:.1em}
  .pbody{padding:8px 10px 14px}

  .boss{display:flex; align-items:center; gap:12px; padding:9px 10px; border-radius:9px}
  .boss:hover{background:var(--bg-2)}
  .boss .bn{flex:1; min-width:0}
  .boss .bn .nm{font-weight:600; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .boss .bn .meta{font-size:11px; color:var(--muted-2); margin-top:1px}
  .pips{display:flex; gap:4px}
  .pip{width:13px; height:13px; transform:rotate(45deg); border:1px solid var(--line); background:var(--bg); transition:.18s}
  .pip.sold{border-color:transparent; background:var(--blue); box-shadow:0 0 8px -1px rgba(0,155,219,.8)}
  .pip.over{background:var(--rose); box-shadow:0 0 8px -1px rgba(232,85,107,.7)}
  .vstate{font-size:11px; font-weight:700; min-width:76px; text-align:right; font-family:var(--font-mono)}
  .vstate.open{color:var(--blue)} .vstate.full{color:var(--muted-2)} .vstate.over{color:var(--rose)}
  .slotin{width:40px; padding:5px 6px; text-align:center; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:12px}
  .slotin:focus{outline:none; border-color:var(--blue)}
  .slotstat{width:40px; text-align:center; font-family:var(--font-mono); font-size:13px; color:var(--muted)}
  .slothint{font-size:10px; color:var(--muted-2); text-align:center; margin-top:1px}
  .divider{height:1px; background:var(--line-soft); margin:10px 8px}

  .salelist{display:flex; flex-direction:column; gap:8px; padding:0 8px}
  .sale{border:1px solid var(--line-soft); border-radius:10px; padding:10px 12px; background:var(--bg-2)}
  .sale .r1{display:flex; align-items:center; gap:8px; justify-content:space-between}
  .sale .buyer{font-weight:600; font-size:14px}
  .sale .price{font-family:var(--font-mono); font-weight:700; color:var(--gold); font-size:14px; white-space:nowrap}
  .sale .r2{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:7px}
  .tag{font-family:var(--font-mono); font-size:10.5px; padding:2px 7px; border-radius:6px; background:var(--bg); border:1px solid var(--line); color:var(--muted)}
  .tag.boss{color:#bfe6f7; border-color:#16384a}
  .tag.dest{color:var(--gold); border-color:#5a4a1e}
  .tag.by{color:var(--muted); border-color:var(--line)}
  .btag{font-family:var(--font-mono); font-size:11px; color:var(--blue); cursor:pointer; border:1px dashed var(--blue-dim); border-radius:6px; padding:2px 7px; background:rgba(0,155,219,.07)}
  .btag:hover{background:rgba(0,155,219,.16)}
  .badge{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:2px 8px; border-radius:20px}
  .badge.reservado{color:var(--warn); background:rgba(232,161,58,.12); border:1px solid rgba(232,161,58,.35)}
  .badge.senado{color:var(--blue); background:rgba(0,155,219,.12); border:1px solid rgba(0,155,219,.4)}
  .badge.pagado{color:var(--ok); background:rgba(47,191,113,.13); border:1px solid rgba(47,191,113,.4)}
  .sale .note{font-size:12px; color:var(--muted); margin-top:6px; font-style:italic}
  .sale .ops{display:flex; gap:6px; margin-left:auto}
  .miniop{font-size:11px; color:var(--muted-2); cursor:pointer; padding:2px 6px; border-radius:6px}
  .miniop:hover{color:var(--text); background:var(--bg)}
  .miniop.del:hover{color:var(--rose)}
  .empty{padding:18px 12px; text-align:center; color:var(--muted-2); font-size:13px}
  .empty b{display:block; color:var(--muted); font-weight:600; margin-bottom:3px}

  .calgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-top:16px}
  .wcard{border:1px solid var(--line-soft); border-radius:12px; background:var(--bg-1); padding:14px 15px; cursor:pointer; transition:.15s; position:relative; overflow:hidden}
  .wcard:hover{border-color:var(--blue); transform:translateY(-2px)}
  .wcard.cur{border-color:var(--blue); box-shadow:0 0 0 1px var(--blue) inset}
  .wcard .wl{font-family:var(--font-display); font-weight:700; letter-spacing:.05em; font-size:15px}
  .wcard .wd{font-family:var(--font-mono); font-size:11px; color:var(--muted-2); margin-top:2px}
  .wcard .wm{display:flex; gap:14px; margin-top:12px; flex-wrap:wrap}
  .wcard .wm div{font-size:11px; color:var(--muted)}
  .wcard .wm b{display:block; font-family:var(--font-mono); font-size:16px; margin-top:1px}
  .wcard .wm b.gold{color:var(--gold)} .wcard .wm b.blue{color:var(--blue)}
  .wcard .adminrow{margin-top:12px; display:flex; gap:8px}

  .audbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:16px}
  .audbar select, .audbar input{padding:8px 11px; border-radius:9px; border:1px solid var(--line); background:var(--bg-1); color:var(--text); font-family:var(--font-body); font-size:13px}
  .audbar input{min-width:150px}
  .audbar input[type=date]{min-width:0}
  .audbar .spacer{flex:1}
  .audsum{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:14px 0}
  .tablewrap{overflow:auto; border:1px solid var(--line-soft); border-radius:12px; margin-top:6px}
  table.aud{width:100%; border-collapse:collapse; font-size:12.5px; min-width:980px}
  table.aud th{text-align:left; font-family:var(--font-display); font-weight:600; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); padding:11px 12px; background:var(--bg-1); border-bottom:1px solid var(--line); position:sticky; top:0}
  table.aud td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:top}
  table.aud tr:hover td{background:var(--bg-1)}
  table.aud .g{font-family:var(--font-mono); color:var(--gold); font-weight:700; white-space:nowrap}
  table.aud .mono{font-family:var(--font-mono); color:var(--muted)}
  .sectitle{font-family:var(--font-display); font-weight:600; letter-spacing:.1em; text-transform:uppercase; font-size:12px; margin:24px 0 10px; color:var(--muted); display:flex; align-items:center; gap:9px}
  .sectitle::before{content:""; width:9px; height:9px; transform:rotate(45deg); background:var(--blue)}
  .destbox{border:1px solid var(--line-soft); border-radius:12px; background:var(--bg-1); padding:6px 16px}
  .destrow{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line-soft); font-size:13px}
  .destrow:last-child{border:0}
  .destrow .g{font-family:var(--font-mono); color:var(--gold); font-weight:700}
  .logrow{display:flex; gap:10px; align-items:baseline; padding:8px 12px; border-bottom:1px solid var(--line-soft); font-size:12.5px}
  .logrow:last-child{border:0}
  .logrow .lt{font-family:var(--font-mono); font-size:11px; color:var(--muted-2); white-space:nowrap; min-width:118px}
  .logrow .la{font-weight:600; color:var(--blue)}
  .logrow .lx{color:var(--muted)}
  .logrow.del .la{color:var(--rose)}

  .utable{width:100%; border-collapse:collapse; font-size:13px}
  .utable th{text-align:left; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); padding:10px 12px; border-bottom:1px solid var(--line)}
  .utable td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle}
  .utable select{padding:6px 9px; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-size:12px}
  .toggle{display:flex; align-items:center; gap:12px; border:1px solid var(--line-soft); border-radius:12px; background:var(--bg-1); padding:14px 16px; margin-top:8px}
  .toggle .lab{flex:1}
  .toggle .lab b{display:block; font-size:14px}
  .toggle .lab span{font-size:12px; color:var(--muted)}
  .sw{width:48px; height:27px; border-radius:20px; background:var(--bg-3); border:1px solid var(--line); position:relative; cursor:pointer; transition:.2s; flex:none}
  .sw::after{content:""; position:absolute; top:2px; left:2px; width:21px; height:21px; border-radius:50%; background:var(--muted); transition:.2s}
  .sw.on{background:rgba(0,155,219,.25); border-color:var(--blue)}
  .sw.on::after{left:23px; background:var(--blue)}

  .scrim{position:fixed; inset:0; background:rgba(3,5,8,.74); backdrop-filter:blur(4px); display:none; place-items:center; padding:18px; z-index:50}
  .scrim.on{display:grid}
  .modal{width:100%; max-width:520px; max-height:92vh; overflow:auto; border:1px solid var(--line); border-radius:16px; background:var(--bg-1); box-shadow:0 30px 80px -20px rgba(0,0,0,.85)}
  .modal.sm{max-width:400px}
  .modal h3{font-family:var(--font-display); font-weight:700; letter-spacing:.1em; text-transform:uppercase; font-size:15px; margin:0; padding:18px 20px 14px; border-bottom:1px solid var(--line-soft)}
  .mbody{padding:16px 20px}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted-2); margin-bottom:6px}
  .field input, .field select, .field textarea{width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--blue)}
  .field textarea{resize:vertical; min-height:54px}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .bosspick{display:flex; flex-direction:column; gap:6px}
  .bosspick .pkrow{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .bosspick label.cb{display:flex; align-items:center; gap:9px; padding:8px 10px; border:1px solid var(--line-soft); border-radius:9px; cursor:pointer; font-size:13.5px; flex:1}
  .bosspick label.cb:hover{border-color:var(--blue)}
  .bosspick label.cb.has{border-color:var(--blue-dim); background:rgba(0,155,219,.06)}
  .bosspick input{accent-color:var(--blue); width:16px; height:16px}
  .bosspick .full{font-size:10px; color:var(--rose); font-family:var(--font-mono)}
  .linkbtn{background:none; border:none; color:var(--blue); font-family:var(--font-body); font-size:12px; cursor:pointer; padding:0; text-decoration:underline}
  .mfoot{display:flex; gap:10px; justify-content:flex-end; padding:14px 20px 18px; border-top:1px solid var(--line-soft)}
  .menu{position:absolute; z-index:55; min-width:200px; border:1px solid var(--line); border-radius:12px; background:var(--bg-1); box-shadow:0 20px 50px -16px rgba(0,0,0,.8); overflow:hidden; display:none}

  .menu .mi:hover{background:var(--bg-2); color:var(--blue)}
  .menu .mi.head{cursor:default; color:var(--muted-2); font-size:11px; text-transform:uppercase; letter-spacing:.08em}
  .menu .mi.head:hover{background:none; color:var(--muted-2)}
  .hint{font-size:12px; color:var(--muted); margin:-4px 0 14px}
  .err{color:var(--rose); font-size:12.5px; margin-top:8px; min-height:16px}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-3); border:1px solid var(--blue); color:var(--text); padding:11px 18px; border-radius:10px; font-size:13px; opacity:0; transition:.25s; z-index:60; pointer-events:none}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
  footer.foot{margin-top:26px; padding-top:16px; border-top:1px solid var(--line-soft); display:flex; gap:14px; flex-wrap:wrap; justify-content:space-between; align-items:center; color:var(--muted-2); font-size:12px}

  /* login screen */
  #login{position:fixed; inset:0; z-index:80; display:none; place-items:center; padding:20px;
    background:radial-gradient(700px 500px at 50% -10%, rgba(0,155,219,.18), transparent 60%), var(--bg)}
  #login.on{display:grid}
  .loginbox{width:100%; max-width:380px; text-align:center}
  .loginbox img{width:72px; height:72px; margin:0 auto 14px; display:block; filter:drop-shadow(0 4px 14px rgba(0,155,219,.45))}
  .loginbox h1{font-family:var(--font-display); font-weight:700; letter-spacing:.34em; text-transform:uppercase; font-size:21px; margin:0}
  .loginbox p{color:var(--muted); font-size:11px; letter-spacing:.22em; text-transform:uppercase; margin:6px 0 26px}
  .loginbox .card{border:1px solid var(--line); border-radius:16px; background:var(--bg-1); padding:22px; text-align:left}
  .loginbox .field{margin-bottom:13px}

  .setup{max-width:680px; margin:40px auto; border:1px solid var(--line); border-radius:16px; background:var(--bg-1); padding:28px 30px}
  .setup h2{font-family:var(--font-display); font-weight:700; letter-spacing:.1em; text-transform:uppercase; font-size:17px; margin:0 0 6px}
  .setup p{color:var(--muted); font-size:13.5px}

  /* filas de ranking del Resumen (flex): nombre se trunca, el número nunca se corta */
  .rankrow{display:flex; align-items:center; gap:9px; padding:8px 2px; border-bottom:1px solid var(--line-soft); font-size:13px}
  .rankrow:last-child{border-bottom:0}
  .rankrow .rk{flex:none; width:20px; text-align:right; color:var(--muted-2); font-family:var(--font-mono); font-size:11.5px}
  .rankrow .nm{flex:1; min-width:0; display:flex; align-items:center; gap:8px}
  .rankrow .nm .classname{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; font-weight:600}
  .rankrow .vl{flex:none; white-space:nowrap; text-align:right; font-family:var(--font-mono); padding-left:6px}
  .rankrow.rankhead{padding-top:2px; padding-bottom:6px; color:var(--muted-2); font-size:10px; text-transform:uppercase; letter-spacing:.08em}
  .tierMini{display:grid; grid-template-columns:18px repeat(5,15px); gap:4px; align-items:center; justify-content:end}
  .tierMini .tierCount{color:var(--ok); font-weight:700}
  .vaultMini{display:grid; grid-template-columns:repeat(4,16px) 28px; gap:4px; align-items:center; justify-content:end}
  .miniHead span{font-family:var(--font-mono); color:var(--muted-2); text-align:center}
  .vaultMini b,.tierMini b{font-family:var(--font-body); font-weight:700; text-align:center}
  .vaultTotal{font-family:var(--font-mono); color:var(--muted-2); text-align:right}
  /* letras de tier: misma tipografía que los nombres (font-body), un poco más grandes */
  .tierL{font-family:var(--font-body); font-weight:700; font-size:14.5px; letter-spacing:.5px}

  /* roster tipo spreadsheet, adaptado al tema Prototype */
  .rosterTitle{display:flex; align-items:center; justify-content:space-between; gap:14px; margin:18px 0 14px; padding:13px 16px; border:1px solid var(--line-soft); border-radius:12px; background:linear-gradient(90deg,var(--bg-1),var(--bg-2))}
  .rosterTitle h2{margin:0; font-family:var(--font-display); font-size:17px; letter-spacing:.13em; text-transform:uppercase}
  .rosterTitle .meta{font-family:var(--font-mono); color:var(--muted-2); font-size:11px}
  .rosterSheet{display:grid; grid-template-columns:250px minmax(0,1fr) 170px; gap:18px; align-items:start}
  .rosterRoles{display:grid; grid-template-columns:repeat(4,minmax(180px,1fr)); gap:18px; align-items:start}
  .rosterSide{display:flex; flex-direction:column; gap:18px}

  .rosterPanel .rh h3{margin:0; font-family:var(--font-display); font-size:14px; letter-spacing:.08em; text-transform:uppercase}
  .rosterPanel .rh .rolebadge{width:27px; height:27px}
  .rosterPanel .rh .rolebadge svg{width:16px; height:16px}
  .rosterTable{width:100%; border-collapse:collapse; table-layout:fixed; font-size:13px}
  .rosterTable th{padding:7px 8px; color:var(--muted); font-weight:500; text-align:left; border-bottom:1px solid var(--line-soft); background:var(--bg-1)}
  .rosterTable th:last-child{text-align:center}
  .rosterTable td{height:30px; padding:6px 8px; border-bottom:1px solid var(--line-soft)}
  .rosterTable tr:last-child td{border-bottom:0}
  .rosterName{display:flex; align-items:center; gap:8px; min-width:0}
  .rosterName b{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--cc,var(--text))}
  .rosterClassCell{width:44%; text-align:center; color:#02070a; background:var(--cc,var(--bg-2)); font-weight:700; text-shadow:0 1px 0 rgba(255,255,255,.18)}
  .rosterClassCell.dark{color:#fff; text-shadow:0 1px 0 rgba(0,0,0,.35)}
  .rosterEmpty{height:30px; opacity:.22}
  .rosterClassList{padding:0}
  .rosterClassRow{display:grid; grid-template-columns:minmax(0,1fr) 34px; align-items:center; min-height:28px; border-bottom:1px solid rgba(255,255,255,.08); background:color-mix(in srgb,var(--cc,var(--bg-2)) 72%,var(--bg-1)); color:#061018}
  .rosterClassRow:last-child{border-bottom:0}
  .rosterClassRow.dark{color:#fff}
  .rosterClassRow .cl{display:flex; align-items:center; gap:8px; min-width:0; padding:5px 8px}
  .rosterClassRow .cl span:last-child{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .rosterClassRow .classbadge{width:20px; height:20px; border-color:rgba(0,0,0,.35)}
  .rosterClassRow .n{align-self:stretch; display:grid; place-items:center; font-family:var(--font-mono); font-weight:700; background:rgba(0,0,0,.16)}
  .rosterMiniRow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 12px; border-bottom:1px solid var(--line-soft); font-size:13px}
  .rosterMiniRow:last-child{border-bottom:0}
  .rosterMiniRow b{font-family:var(--font-mono); color:var(--gold)}
  .rosterTotal{background:rgba(0,155,219,.08)}
  .rosterBoard{display:grid; grid-template-columns:290px minmax(0,1fr) 260px; gap:18px; align-items:start; margin-top:10px}
  .rosterMain{min-width:0}
  .rosterMain .sectitle{margin:8px 0 12px}
  .rosterAside{display:flex; flex-direction:column; gap:18px}
  .rosterSideBlock .sectitle{margin:8px 0 12px}
  .rosterClassCard{align-self:start}
  .rosterCounterPanel .pbody{padding-top:9px}
  .rosterRoleGrid{display:grid; grid-template-columns:repeat(4,minmax(190px,1fr)); gap:16px; align-items:start; justify-content:start; width:100%}

  .rosterPerson span.meta{display:block; margin-top:3px; color:var(--muted-2); font-size:11px}
  .rosterSummaryGrid{display:grid; grid-template-columns:360px 280px 260px; gap:18px; align-items:start; justify-content:start; width:max-content; max-width:100%; margin-top:18px}

  .roleMini{display:flex; align-items:center; gap:9px}
  .roleMini .rolebadge{width:19px; height:19px}
  .roleMini .rolebadge svg{width:11px; height:11px}
  .abilityBoard{margin-top:18px; width:100%}
  .abilityGroups{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; padding:12px}
  .abilityGroup{border:1px solid var(--line-soft); border-radius:10px; background:var(--bg); overflow:hidden}
  .abilityGroup h3{margin:0; padding:10px 12px; border-bottom:1px solid var(--line-soft); font-family:var(--font-display); font-size:12px; letter-spacing:.1em; text-transform:uppercase}
  .abilityItem{padding:10px 12px; border-bottom:1px solid var(--line-soft)}
  .abilityItem:last-child{border-bottom:0}
  .abilitySpell{display:grid; grid-template-columns:24px minmax(0,1fr); gap:4px 8px; align-items:start; color:var(--cc,var(--text))}
  .abilitySpell img{width:22px; height:22px; border-radius:5px; border:1px solid var(--line)}

  .abilityRoleTags{display:flex; gap:5px; flex-wrap:wrap; min-width:0}

  .abilityChar{font-size:11.5px; padding:2px 7px; border:1px solid var(--line); border-radius:999px; color:var(--cc,var(--text)); background:var(--bg-1)}

  .abilityForm{display:grid; grid-template-columns:100px minmax(150px,1fr) 150px 150px auto auto; gap:10px; align-items:end}
  .abilityForm input,.abilityForm select{width:100%; padding:8px 10px; border-radius:9px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-family:var(--font-body)}
  .abilityForm label{display:block; color:var(--muted-2); font-size:10px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:5px}
  .abilityRolePick{display:flex; gap:8px; flex-wrap:wrap}
  .abilityForm .abilityRoleField{grid-column:1/-1}
  .abilityRolePick label{display:inline-flex; align-items:center; gap:7px; margin:0; padding:7px 10px; border:1px solid var(--line); border-radius:9px; color:var(--text); background:var(--bg); cursor:pointer; font-size:12px; letter-spacing:0; text-transform:none}
  .abilityRolePick label:hover{border-color:var(--blue-dim)}
  .abilityRolePick input{width:14px; height:14px; accent-color:var(--blue)}
  .abilityRolePick label:has(input:checked){border-color:var(--blue); background:rgba(0,155,219,.08)}
  .abilityList{margin-top:12px}
  .abilityList .destrow{align-items:center}
  .abilityChip{display:inline-flex; align-items:center; gap:7px}
  .abilityChip img{width:20px; height:20px; border-radius:5px; border:1px solid var(--line)}
  .singleView{margin-top:14px}
  .singleTop{display:grid; grid-template-columns:270px minmax(0,1fr); gap:16px; align-items:stretch; margin-bottom:16px}
  .singleLookup{border:1px solid var(--line-soft); border-radius:12px; background:var(--bg-1); padding:14px 16px}
  .singleLookup label{display:block; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin-bottom:7px}
  .singleLookup select{width:100%; padding:11px 12px; border-radius:9px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-family:var(--font-body); font-weight:700}
  .singleHero{border:1px solid var(--line-soft); border-radius:12px; background:linear-gradient(100deg,color-mix(in srgb,var(--cc,var(--blue)) 20%,var(--bg-2)),var(--bg-1)); padding:15px 18px; display:flex; align-items:center; justify-content:space-between; gap:14px; overflow:hidden; position:relative}
  .singleHero::after{content:""; position:absolute; right:28px; top:-48px; width:120px; height:120px; border:1px solid color-mix(in srgb,var(--cc,var(--blue)) 45%,transparent); transform:rotate(45deg); opacity:.22}
  .singleIdentity{display:flex; align-items:center; gap:12px; min-width:0}
  .singleIdentity .classbadge{width:42px; height:42px}
  .singleIdentity h2{margin:0; font-family:var(--font-display); letter-spacing:.12em; text-transform:uppercase; font-size:20px}
  .singleIdentity .meta{font-family:var(--font-mono); color:var(--muted); font-size:11px; margin-top:3px}

  .singleHeroStats .mini{min-width:78px; text-align:right}

  .singleHeroStats .mini span{font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted-2)}
  .singleGrid{display:grid; grid-template-columns:minmax(360px,1.08fr) minmax(280px,.92fr) minmax(260px,.8fr); gap:16px; align-items:start}
  .singleStack{display:flex; flex-direction:column; gap:16px}
  .singlePanel .pbody{padding:10px 12px 14px}
  .singleKV{display:grid; grid-template-columns:minmax(110px,1fr) minmax(120px,1fr); gap:0 12px}
  .singleKV .destrow{padding:8px 0}
  .singleGear{width:100%; border-collapse:collapse; font-size:12.5px}
  .singleGear th{text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted-2); padding:7px 8px; border-bottom:1px solid var(--line)}

  .singleEmpty{color:var(--muted-2); font-size:12.5px; padding:8px 2px}
  .rioHead{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}

  .rioTab.on{border-color:var(--blue); color:var(--text); background:rgba(0,155,219,.1)}
  .rioScore{font-family:var(--font-mono); color:var(--purple); font-weight:800}

  .rioLevel{font-family:var(--font-mono); color:var(--gold); white-space:nowrap}

  .recruitName{min-width:0}

  .recruitName span{display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted-2); font-size:11px; margin-top:1px}

  .recruitStatus{font-family:var(--font-mono); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; padding:3px 7px; border-radius:999px; border:1px solid currentColor}

  .recruitStatus.reviewing{color:var(--gold)}
  .recruitStatus.accepted{color:var(--ok)}
  .recruitStatus.declined{color:var(--rose)}
  .recruitStatus.archived{color:var(--muted-2)}

  .wclPanel{margin-bottom:0}
  .wclHead{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:12px 14px; border-bottom:1px solid var(--line-soft); background:linear-gradient(90deg,rgba(155,123,232,.16),transparent)}

/* ---------- calculo: Great Vault, encantamientos, gemas ---------- */
function vaultMplusSlots(bestRuns){ const n=(bestRuns||[]).length; if(n>=8) return 3; if(n>=4) return 2; if(n>=1) return 1; return 0; }
function vaultRaidSlots(killedThisWeek){
  const seen=new Set();
  Object.entries(killedThisWeek||{}).forEach(([inst,diffs])=>{ Object.values(diffs).forEach(bosses=> bosses.forEach(b=> seen.add(inst+'::'+b))); });
  const n=seen.size; if(n>=6) return 3; if(n>=4) return 2; if(n>=2) return 1; return 0;
}
function gearGaps(gear){
  let missingEnchant=0, missingGem=0, socketedGem=0;
  (gear||[]).forEach(item=>{
    const slot=item.slot && item.slot.type;
    if(slot && ENCHANTABLE_SLOTS.includes(slot) && !(item.enchantments && item.enchantments.length)) missingEnchant++;
    (item.sockets||[]).forEach(s=>{ if(s.item) socketedGem++; else missingGem++; });
  });
  return { missingEnchant, missingGem, socketedGem };
}
function gearBySlot(gear){ const m={}; (gear||[]).forEach(it=>{ if(it.slot&&it.slot.type) m[it.slot.type]=it; }); return m; }
function itemIlvl(it){ return it && it.ilvl ? it.ilvl.value : (it&&it.level?it.level.value:null); }
function gearEquippedIlvl(gear){
  const bySlot=gearBySlot(gear);
  let sum=0, count=0;
  GEAR_SLOT_ORDER.forEach(([slot])=>{
    let it=bySlot[slot];
    if(!it && slot==="OFF_HAND" && bySlot.MAIN_HAND) it=bySlot.MAIN_HAND;
    const v=itemIlvl(it);
    if(v!=null){ sum+=Number(v); count++; }
  });
  return count ? sum/count : null;
}
function displayIlvl(p){
  const fromGear=gearEquippedIlvl(p&&p.gear);
  if(fromGear!=null) return fromGear;
  return p&&p.equipped_ilvl!=null ? Number(p.equipped_ilvl) : null;
}
function fmtIlvl(p){ const v=displayIlvl(p); return v==null ? "—" : v.toFixed(2); }
/* piezas de tier: por cada slot de tier, la pieza equipada trae un set.item_set */
function tierInfo(gear){ const bySlot=gearBySlot(gear); let count=0; const slots={}; TIER_SLOTS.forEach(s=>{ const it=bySlot[s]; const isTier=!!(it&&it.set&&it.set.item_set); slots[s]= isTier ? { letter:pieceLetter(it), ilvl:itemIlvl(it) } : null; if(isTier) count++; }); return { count, slots }; }
/* distribución de stats secundarios (% del total), sumando todo el equipo */
function statDist(gear){ const sums={}; let tot=0; (gear||[]).forEach(it=>(it.stats||[]).forEach(s=>{ const t=s.type&&s.type.type; if(SECONDARY_STATS.find(x=>x[0]===t)){ sums[t]=(sums[t]||0)+(s.value||0); tot+=s.value||0; } })); const pct={}; SECONDARY_STATS.forEach(([k])=>{ pct[k]= tot? Math.round((sums[k]||0)/tot*100):0; }); return pct; }
/* grilla de encantamientos: por slot encantable, true=tiene, false=falta, null=slot vacío */
function enchantGrid(gear){ const bySlot=gearBySlot(gear); const g={}; ENCHANTABLE_SLOTS.forEach(s=>{ const it=bySlot[s]; g[s]= it ? !!(it.enchantments&&it.enchantments.length) : null; }); return g; }
/* opciones de bóveda por slot: M+ = nivel de key (1ª/4ª/8ª más alta); raid = dificultad del 2º/4º/6º jefe */
function vaultMplusDetail(bestRuns){ const runs=[...(bestRuns||[])].map(r=>r.keystone_level||0).sort((a,b)=>b-a); return [runs[0]??null, runs[3]??null, runs[7]??null]; }
function vaultRaidDetail(killed){ const diffs=[]; Object.values(killed||{}).forEach(byDiff=> Object.entries(byDiff).forEach(([d,bosses])=> bosses.forEach(()=> diffs.push(d)))); diffs.sort((a,b)=>(DIFF_RANK[b]||0)-(DIFF_RANK[a]||0)); return [diffs[1]||null, diffs[3]||null, diffs[5]||null]; }
function vaultMplusLetter(key){ if(key==null) return null; return key>=10 ? "M" : "H"; }
function vaultRaidLetter(diff){ if(!diff) return null; const l=DIFF_LETTER[diff]||diff; return l==="L" ? "V" : l; }
function vaultTrackCounts(r){
  const counts={ M:0, H:0, N:0, V:0 };
  vaultMplusDetail(r.p&&r.p.mythic_best_runs).forEach(k=>{ const l=vaultMplusLetter(k); if(l) counts[l]++; });
  vaultRaidDetail(r.killed).forEach(d=>{ const l=vaultRaidLetter(d); if(l&&counts[l]!=null) counts[l]++; });
  return counts;
}
function vaultTotalSlots(r){ const c=vaultTrackCounts(r); return c.M+c.H+c.N+c.V+(r.vaultW||0); }
function vaultSummaryHtml(r){
  const c=vaultTrackCounts(r);
  const total=c.M+c.H+c.N+c.V+(r.vaultW||0);
  return `<span class="vaultMini">${["M","H","N","V"].map(l=>trackLetterHtml(l,c[l])).join('')}<span class="vaultTotal">${total}/${GREAT_VAULT_MAX_SLOTS}</span></span>`;
}
function charStats(ch){
  const p=characterProgress.find(x=>x.character_id===ch.id)||{};
  const killed=(p.raid_progress&&p.raid_progress._killed_this_week)||{};
  const gaps=gearGaps(p.gear);
  return { ch, p, killed,
    mplusRuns:(p.mythic_best_runs||[]).length,
    vaultM:vaultMplusSlots(p.mythic_best_runs),
    vaultR:vaultRaidSlots(killed),
    vaultW:0,
    tier:tierInfo(p.gear),
    ...gaps
  };
}

function rioRoleKey(role){

function rioIconUrl(icon){

function rioRunSummary(run){ return run&&run.summary ? run.summary : run||{}; }
function rioRunDungeon(run){ const s=rioRunSummary(run); return s.dungeon||run.dungeon||{}; }
function rioRunName(run){ const d=rioRunDungeon(run); return d.name||run.dungeon||'—'; }
function rioDungeonCanonicalKey(value){
  return String(value||'')
    .normalize('NFD')

    .toLowerCase()

function rioRunDungeonKey(run){

function rioRunId(run){ const s=rioRunSummary(run); return s.keystone_run_id||run.keystone_run_id; }

function rioRunSort(a,b){

function rioBestDungeonRuns(runs){
  const best=new Map();

    const key=rioRunDungeonKey(run);

function rioDungeonCatalog(row){

  };
  rioRuns(row).forEach(add);
  const roles=(row&&row.all_runs&&row.all_runs.roles)||{};
  Object.values(roles).forEach(pack=>{

  });
  return [...map.entries()].map(([key,dungeon])=>({key,dungeon,name:typeof dungeon==='string'?dungeon:(dungeon&&dungeon.name)||'—'}))
    .sort((a,b)=>String(a.name).localeCompare(String(b.name)));

function rioAllRunGroups(row){

const RAID_DIFFS = [
  { key:'mythic', label:'M', cls:'prog-m', names:['MYTHIC','MYTHIC_RAID','Mythic'] },
  { key:'heroic', label:'H', cls:'prog-h', names:['HEROIC','HEROIC_RAID','Heroic'] },

  { key:'lfr', label:'LFR', cls:'prog-l', names:['LFR','RAID_FINDER','Raid Finder'] },

function progKey(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,''); }
function progDiffKey(diff){
  const k=progKey(diff);
  const found=RAID_DIFFS.find(d=>d.names.some(n=>progKey(n)===k)||k.includes(d.key));
  return found ? found.key : '';

function progFlatten(progress){
  const out=new Map();
  Object.entries(progress||{}).forEach(([raid,diffs])=>{
    if(String(raid).startsWith('_')||!diffs||typeof diffs!=='object') return;
    Object.entries(diffs).forEach(([diff,bosses])=>{
      const dkey=progDiffKey(diff);
      if(!dkey||!bosses||typeof bosses!=='object') return;
      Object.entries(bosses).forEach(([boss,count])=>{
        const key=progKey(boss), n=Number(count)||0;
        const prev=out.get(key)||{};
        prev[dkey]=Math.max(prev[dkey]||0,n);
        out.set(key,prev);
      });
    });
  });
  return out;
}

function recruitSnapshot(app){

}
function recruitNorm(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function recruitRosterMatch(app){
  const nm=recruitNorm(app.character_name||recruitSnapshot(app).name), realm=recruitNorm(app.realm_slug||recruitSnapshot(app).realm_slug), region=recruitNorm(app.region||recruitSnapshot(app).region||'us');
  return recruitLinkedCharacter(app) || characters.find(ch=>!ch.is_recruit_shadow && recruitNorm(ch.name)===nm && recruitNorm(ch.realm_slug)===realm && recruitNorm(ch.region||'us')===region);
}
function recruitRows(){
  const q=recruitNorm(recruitFilter.q), st=recruitFilter.status;
  return [...(recruits||[])].filter(app=>{
    if(st==='open' && !['new','reviewing'].includes(app.status||'new')) return false;
    else if(st!=='all' && st!=='open' && app.status!==st) return false;
    if(!q) return true;
    return [app.character_name, app.realm_name, app.realm_slug, app.class, app.main_spec, app.role, app.discord, app.battle_tag, app.status]
      .some(v=>recruitNorm(v).includes(q));
  }).sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
}
function recruitPanel(title, body, extra=''){
  return `<div class="panel singlePanel"><div class="phead"><h2><span class="dia"></span>${esc(title)}</h2></div><div class="pbody">${body||'<div class="singleEmpty">—</div>'}${extra}</div></div>`;
}

  const rio=app.raiderio_url||`https://raider.io/characters/${encodeURIComponent(app.region||s.region||'us')}/${encodeURIComponent(app.realm_slug||s.realm_slug||'')}/${encodeURIComponent(app.character_name||s.name||'')}`;
  const btn=(href,label)=>href?`<a class="btn ghost sm" href="${esc(href)}" target="_blank" rel="noopener">${esc(label)}</a>`:'';
  return recruitPanel('Links', `<div class="actions">${btn(armory,'Armory')}${btn(wcl,'Warcraft Logs')}${btn(rio,'Raider.IO')}</div>`);
}

function renderReclutas(){
  const c=document.getElementById('content');
  if(!cap('manageRecruits')){ c.innerHTML='<div class="empty" style="padding:60px"><b>Sin permiso</b>Tu usuario no puede ver postulaciones.</div>'; return; }
  if(recruitLoadError){
    c.innerHTML=`<div class="panel"><div class="phead"><h2><span class="dia"></span>Reclutas</h2></div><div class="empty" style="padding:42px"><b>No se pudo cargar recruit-admin</b>Deployá <code>supabase/functions/recruit-admin</code> y corré el SQL 018. Error: <code>${esc(recruitLoadError)}</code></div></div>`;
    return;
  }
  const rows=recruitRows();
  if(selectedRecruitId && !rows.find(r=>r.id===selectedRecruitId)) selectedRecruitId=rows[0]&&rows[0].id||'';
  if(!selectedRecruitId && rows.length) selectedRecruitId=rows[0].id;
  const app=rows.find(r=>r.id===selectedRecruitId)||rows[0]||null;
  const list=rows.map(app=>{
    const s=recruitSnapshot(app), cls=recruitClass(app), avatar=s.avatar_url, match=recruitRosterMatch(app);
    return `<div class="recruitRow ${app.id===selectedRecruitId?'on':''}" data-recruit-id="${esc(app.id)}" style="--cc:${CLASS_COLOR[cls]||'var(--text)'}">
      <div class="recruitAvatar">${avatar?`<img src="${esc(avatar)}" alt="">`:classBadge(cls)}</div>
      <div class="recruitName"><b>${esc(app.character_name||s.name||'—')}</b><span>${esc(cls||'—')} · ${esc(recruitSpec(app)||'—')} · ${esc(recruitRealm(app)||'—')}${match?' · roster':''}</span></div>
      <div class="recruitMeta"><span class="recruitStatus ${esc(app.status||'new')}">${esc(RECRUIT_STATUS_LABEL[app.status]||app.status||'Nuevo')}</span><span class="recruitAge">${app.created_at?fmtDateTime(app.created_at):'—'}</span></div>
    </div>`;
  }).join('');
  const detail=app?recruitDetailHtml(app):'<div class="panel recruitDetail"><div class="recruitEmpty">No hay postulaciones con este filtro.</div></div>';
  c.innerHTML=`<div class="wbar"><div class="sectitle" style="margin:0">Reclutas</div><div class="actions"><button class="btn ghost sm" id="recruitReload">↻ Recargar</button><a class="btn ghost sm" href="${esc(recruitFormHref())}" target="_blank" rel="noopener">Abrir formulario</a></div></div>
    <div class="recruitBoard">
      <div class="panel">
        <div class="recruitTools"><input id="recruitQ" placeholder="Buscar recluta…" value="${esc(recruitFilter.q)}"><select id="recruitStatusFilter"><option value="open" ${recruitFilter.status==='open'?'selected':''}>Abiertas</option><option value="all" ${recruitFilter.status==='all'?'selected':''}>Todos</option>${Object.entries(RECRUIT_STATUS_LABEL).map(([k,v])=>`<option value="${k}" ${recruitFilter.status===k?'selected':''}>${esc(v)}</option>`).join('')}</select></div>
        <div class="recruitRows">${list||'<div class="empty">Sin postulaciones todavía.</div>'}</div>
      </div>
      ${detail}
    </div>`;
  document.getElementById('recruitReload').onclick=async()=>{ try{ await fetchRecruits(); renderReclutas(); toast('Reclutas actualizados'); }catch(e){ recruitLoadError=e.message||String(e); renderReclutas(); } };
  document.getElementById('recruitQ').oninput=e=>{ recruitFilter.q=e.target.value; renderReclutas(); };
  document.getElementById('recruitStatusFilter').onchange=e=>{ recruitFilter.status=e.target.value; renderReclutas(); };
  document.querySelectorAll('[data-recruit-id]').forEach(el=> el.onclick=()=>{ selectedRecruitId=el.dataset.recruitId; renderReclutas(); });
  wireRecruitDetail(app);
}

      <button class="btn ghost sm" id="recruitRefreshArmory">↻ Armory</button>

      <button class="btn ghost sm" id="recruitOpenPanel" ${ch?'':'disabled'}>${panelOpen?'Ocultar Panel de Personaje':'Abrir Panel de Personaje'}</button>

        <div class="singleHeroStats"><div class="mini"><b>${ilvl||'—'}</b><span>item level</span></div><div class="mini"><b>${app.level||s.level||'—'}</b><span>nivel</span></div><div class="mini"><b>${esc(RECRUIT_STATUS_LABEL[app.status]||app.status||'Nuevo')}</b><span>estado</span></div></div>
      </div>

function wireRecruitDetail(app){
  if(!app) return;
  const st=document.getElementById('recruitStatusSelect');
  if(st) st.onchange=()=>updateRecruitStatus(app,st.value);
  const del=document.getElementById('recruitDelete');
  if(del) del.onclick=()=>deleteRecruit(app);
  const add=document.getElementById('recruitAddRoster');
  if(add) add.onclick=()=>addRecruitToRoster(app,add);
  const open=document.getElementById('recruitOpenPanel');
  if(open) open.onclick=()=>{ recruitPanelOpenId = recruitPanelOpenId===app.id ? '' : app.id; renderReclutas(); refresh(false); };
  const arm=document.getElementById('recruitRefreshArmory');
  if(arm) arm.onclick=()=>refreshRecruitArmory(app,arm);
  const wz=document.getElementById('wclZone'); if(wz) wz.onchange=()=>{ singleWclZone=wz.value; renderReclutas(); };
  const wm=document.getElementById('wclMetric'); if(wm) wm.onchange=()=>{ singleWclMetric=wm.value; renderReclutas(); };
  const wd=document.getElementById('wclDifficulty'); if(wd) wd.onchange=()=>{ singleWclDifficulty=wd.value; renderReclutas(); };
  const ch=recruitRosterMatch(app);
  const wb=document.getElementById('wclSync'); if(wb&&ch) wb.onclick=()=>manualWclSync(ch,wb);
  const rb=document.getElementById('rioSync'); if(rb&&ch) rb.onclick=()=>manualRaiderSync(ch,rb);
  document.querySelectorAll('[data-rio-spec]').forEach(b=> b.onclick=()=>{ singleRioSpec=b.dataset.rioSpec; renderReclutas(); });
}
async function updateRecruitStatus(app,status){
  try{ await recruitAdmin('PATCH',{id:app.id,status}); await fetchRecruits(); renderReclutas(); toast('Estado actualizado'); }
  catch(e){ toast('No se pudo cambiar estado'); }
}
async function refreshRecruitArmory(app,btn){
  const orig=btn.textContent; btn.disabled=true; btn.textContent='Actualizando…';
  try{ await recruitAdmin('POST',{action:'refresh_armory',id:app.id}); await fetchRecruits(); renderReclutas(); toast('Snapshot Armory actualizado'); }
  catch(e){ toast('No se pudo refrescar Armory'); }
  finally{ btn.disabled=false; btn.textContent=orig; }
}
async function deleteRecruit(app){
  if(!confirm('¿Borrar la postulación de "'+(app.character_name||'este recluta')+'"? Esto borra solo la postulación y su cache.')) return;
  try{ await recruitAdmin('DELETE',null,'?id='+encodeURIComponent(app.id)); selectedRecruitId=''; await fetchRecruits(); renderReclutas(); toast('Postulación borrada'); }
  catch(e){ toast('No se pudo borrar'); }
}
async function addRecruitToRoster(app,btn){
  const orig=btn.textContent; btn.disabled=true; btn.textContent='Agregando…';
  try{
    const before=recruitRosterMatch(app);
    await recruitAdmin('POST',{action:'import_to_roster',id:app.id});
    toast(before?'Actualizado en roster':'Agregado al roster — los syncs quedan en cola');
    await refresh(true);
    if(view==='reclutas') renderReclutas();
  }catch(e){ toast('No se pudo agregar al roster'); }
  finally{ btn.disabled=false; btn.textContent=orig; }
}

/* ---------- ROSTER (composición por rol / clase / armadura) ---------- */
function renderRosterComp(){
  const c=document.getElementById('content');
  const active=characters.filter(ch=>ch.active!==false);
  if(!active.length){ c.innerHTML='<div class="empty" style="padding:60px"><b>Sin personajes todavía</b></div>'; return; }
  const roleKeys=['tank','healer','ranged','melee'];
  const byRole={ tank:[], healer:[], ranged:[], melee:[] };
  active.forEach(ch=> (byRole[ch.role]||(byRole[ch.role]=[])).push(ch));
  roleKeys.forEach(r=>byRole[r].sort((a,b)=>String(a.name).localeCompare(String(b.name))));
  const classCounts={}; active.forEach(ch=> classCounts[ch.class]=(classCounts[ch.class]||0)+1);
  const armorCounts={ Cloth:0, Leather:0, Mail:0, Plate:0 };
  active.forEach(ch=>{ const a=CLASS_ARMOR[ch.class]; if(a) armorCounts[a]++; });
  const classOrder=Object.keys(CLASS_ARMOR).filter(cl=>classCounts[cl]);
  const rolePanel=(key,label)=> {
    const rows=byRole[key]||[];
    return `<div class="panel rosterRoleCard"><div class="phead"><h2>${roleBadge(key)}${esc(label)} (${rows.length})</h2></div>
      <div class="pbody">${rows.map(ch=>`<div class="rosterPerson" style="--cc:${CLASS_COLOR[ch.class]||'var(--text)'}">${classBadge(ch.class)}<div><b>${esc(ch.name)}</b><span class="meta">${esc(ch.class||'—')}</span></div></div>`).join('')||'<div class="empty">—</div>'}</div></div>`;
  };
  const classRows=classOrder.map(cl=>`<div class="destrow">${classTag(cl)}<span class="g">${classCounts[cl]}</span></div>`).join('');
  const compositionRows=roleKeys.map(r=>`<div class="destrow"><span class="roleMini">${roleBadge(r)}${esc(CHAR_ROLE_LABEL[r])}</span><span class="g">${(byRole[r]||[]).length}</span></div>`).join('');
  const armorRows=Object.entries(armorCounts).map(([a,n])=>`<div class="destrow"><span>${esc(ARMOR_LABEL[a]||a)}</span><span class="g">${n}</span></div>`).join('');
  const html=`<div class="rosterBoard">
      <div class="rosterSideBlock">
        <div class="sectitle">Clases</div>
        <div class="panel rosterClassCard rosterCounterPanel"><div class="pbody">${classRows}</div></div>
      </div>
      <div class="rosterMain">
        <div class="sectitle">Composición del roster</div>
        <div class="rosterRoleGrid">
          ${rolePanel('tank','Tanks')}
          ${rolePanel('healer','Healers')}
          ${rolePanel('ranged','Ranged')}
          ${rolePanel('melee','Melee')}
        </div>
      </div>
      <div class="rosterAside">
        <div class="rosterSideBlock">
          <div class="sectitle">Composición</div>
          <div class="panel rosterCounterPanel"><div class="pbody">${compositionRows}<div class="destrow"><span><b>Total</b></span><span class="g">${active.length}</span></div></div></div>
        </div>
        <div class="rosterSideBlock">
          <div class="sectitle">Tipos de armadura</div>
          <div class="panel rosterCounterPanel"><div class="pbody">${armorRows}<div class="destrow"><span><b>Total</b></span><span class="g">${active.length}</span></div></div></div>
        </div>
      </div>
    </div>
    ${renderTrackedAbilityBoard(active)}`;
  c.innerHTML=html;
}
function renderTrackedAbilityBoard(active){
  const abilities=trackedAbilities.filter(a=>a.enabled!==false).sort((a,b)=>String(a.group_name||'').localeCompare(String(b.group_name||'')) || String(a.name||'').localeCompare(String(b.name||'')));
  if(!abilities.length) return `<div class="panel abilityBoard"><div class="phead"><h2><span class="dia"></span>Habilidades trackeadas</h2></div><div class="empty">Sin habilidades trackeadas configuradas.</div></div>`;
  const groups={};
  abilities.forEach(a=>{ const g=a.group_name||'Utilidad'; (groups[g]||(groups[g]=[])).push(a); });
  const html=Object.entries(groups).map(([g,items])=>`<div class="abilityGroup"><h3>${esc(g)}</h3>${items.map(a=>{
    const cls=a.class;
    const chars=active.filter(ch=>ch.class===cls && abilityAllowsRole(a,ch.role)).sort((x,y)=>String(x.name).localeCompare(String(y.name)));
    return `<div class="abilityItem"><div class="abilitySpell" style="--cc:${CLASS_COLOR[cls]||'var(--text)'}">${a.icon_url?`<img src="${esc(a.icon_url)}" alt="">`:classBadge(cls)}<div class="abilityTitle"><span class="abilityName">${esc(a.name)}</span><span class="mono" style="color:var(--muted-2)">#${a.spell_id}</span></div><div class="abilityRoleTags">${abilityRoleTags(a)}</div></div>
      <div class="abilityChars">${chars.length?chars.map(ch=>`<span class="abilityChar" style="--cc:${CLASS_COLOR[ch.class]||'var(--text)'}">${esc(ch.name)}</span>`).join(''):'<span class="meta">Sin personajes de '+esc(cls)+'</span>'}</div></div>`;
  }).join('')}</div>`).join('');
  return `<div class="panel abilityBoard"><div class="phead"><h2><span class="dia"></span>Habilidades trackeadas</h2></div><div class="abilityGroups">${html}</div></div>`;
}
function realmLabel(region,slug){
  if(!region||!slug) return '';
  const r=realms.find(x=>x.region===region && x.slug===slug);
  return region.toUpperCase()+'-'+(r?r.name:slug);
}
function charFormFields(ch){
  const realmDisp = ch ? realmLabel(ch.region,ch.realm_slug) : '';
  return `<div class="field"><label>Nombre del personaje</label><input type="text" id="ch_name" value="${ch?esc(ch.name):''}"></div>
    <div class="field" style="position:relative">
      <label>Servidor</label>
      <input type="text" id="ch_realm_search" placeholder="Escribí para buscar (ej. quel)" autocomplete="off" value="${esc(realmDisp)}">
      <input type="hidden" id="ch_realm_slug" value="${ch?esc(ch.realm_slug||''):''}">
      <input type="hidden" id="ch_realm_region" value="${ch?esc(ch.region||''):''}">
      <div class="menu" id="ch_realm_list" style="position:absolute; top:100%; left:0; right:0; margin-top:4px; max-height:220px; overflow:auto"></div>
    </div>
    <div class="field"><label>Rol</label><select id="ch_role">${Object.keys(CHAR_ROLE_LABEL).map(r=>`<option value="${r}" ${ch&&ch.role===r?'selected':''}>${CHAR_ROLE_LABEL[r]}</option>`).join('')}</select></div>
    <p class="hint">La clase (${ch?esc(ch.class||'todavía sin sincronizar'):'se completa sola'}) sale de Battle.net en la próxima sincronización — no hace falta elegirla acá.</p>
    <div class="err" id="ch_err"></div>`;
}
function wireRealmPicker(){
  const inp=document.getElementById('ch_realm_search');
  const list=document.getElementById('ch_realm_list');
  const hSlug=document.getElementById('ch_realm_slug');
  const hRegion=document.getElementById('ch_realm_region');
  function renderList(){
    const q=inp.value.trim().toLowerCase();
    if(q.length<2){ list.classList.remove('on'); list.innerHTML=''; return; }
    const matches=realms.filter(r=> r.name.toLowerCase().includes(q) || r.slug.includes(q)).slice(0,12);
    if(!matches.length){ list.innerHTML='<div class="mi head">Sin resultados</div>'; list.classList.add('on'); return; }
    list.innerHTML=matches.map(r=>`<div class="mi" data-region="${r.region}" data-slug="${esc(r.slug)}">${r.region.toUpperCase()}-${esc(r.name)}</div>`).join('');
    list.classList.add('on');
    list.querySelectorAll('.mi[data-slug]').forEach(mi=> mi.onclick=()=>{
      hSlug.value=mi.dataset.slug; hRegion.value=mi.dataset.region; inp.value=mi.textContent;
      list.classList.remove('on'); list.innerHTML='';
    });
  }
  inp.oninput=()=>{ hSlug.value=''; hRegion.value=''; renderList(); };
  inp.onfocus=()=>{ if(inp.value.trim().length>=2) renderList(); };
  document.addEventListener('click', function outside(e){ if(!e.target.closest('#ch_realm_search') && !e.target.closest('#ch_realm_list')) list.classList.remove('on'); });
}
function openNewChar(){
  openM2('Nuevo personaje', charFormFields(null), async()=>{
    const name=document.getElementById('ch_name').value.trim();
    const slug=document.getElementById('ch_realm_slug').value, region=document.getElementById('ch_realm_region').value;
    const rl=document.getElementById('ch_role').value;
    const err=document.getElementById('ch_err'); err.textContent='';
    if(!name){ err.textContent='Poné el nombre del personaje.'; return false; }
    if(!slug||!region){ err.textContent='Elegí un servidor de la lista (no vale escribirlo libre).'; return false; }

function renderRaid(k,w){
  const R=RAIDS[k]; const raidGold=w.sales.filter(s=>s.raid===k).reduce((a,s)=>a+(s.gold||0),0);
  let bossRows='';
  R.bosses.forEach(b=>{
    const total=(w.slots[k]||{})[b]??DEFAULT_SLOTS; const sold=soldFor(w,k,b); const vac=total-sold;
    let pips=''; const shown=Math.max(total,sold);
    for(let i=0;i<shown;i++){ const cls=i<sold?(i<total?'sold':'over'):''; pips+=`<span class="pip ${cls}"></span>`; }
    let st,scls; if(vac>0){st=vac+' vacante'+(vac>1?'s':'');scls='open';} else if(vac===0){st='completo';scls='full';} else{st='+'+(-vac)+' extra';scls='over';}
    const slotCell = cap('editSlots') ? `<input class="slotin" type="number" min="0" value="${total}" data-raid="${k}" data-boss="${esc(b)}"><div class="slothint">cupos</div>` : `<div class="slotstat">${total}</div><div class="slothint">cupos</div>`;
    bossRows+=`<div class="boss"><div class="bn"><div class="nm">${esc(b)}</div><div class="meta">${sold}/${total} vendidas</div></div><div class="pips">${pips}</div><div class="vstate ${scls}">${st}</div><div>${slotCell}</div>${(cap('addSale')&&vac>0)?`<button class="qadd" data-raid="${k}" data-boss="${esc(b)}" title="Cargar venta de ${esc(b)}">+</button>`:''}</div>`;
  });
  const sales=w.sales.filter(s=>s.raid===k);
  let saleHtml = !sales.length ? `<div class="empty"><b>Sin ventas todavía</b>${cap('addSale')?'Tocá “+ Venta” para anotar un comprador.':'Sin registros.'}</div>`
    : '<div class="salelist">'+sales.map(s=>{
      const bossTags=(s.bosses||[]).length===R.bosses.length?'<span class="tag boss">CLEAR COMPLETO</span>':(s.bosses||[]).map(b=>`<span class="tag boss">${esc(b)}</span>`).join('');
      const ops = (canEditSale(s)||cap('delSale')) ? `<span class="ops">${canEditSale(s)?`<span class="miniop edit" data-id="${s.id}">editar</span>`:''}${cap('delSale')?`<span class="miniop del" data-id="${s.id}">borrar</span>`:''}</span>` : '';
      return `<div class="sale"><div class="r1"><span class="buyer">${esc(s.buyer)||'(sin nombre)'}</span><span class="price">${fmtGold(s.gold)}</span></div>
        <div class="r2"><span class="badge ${s.status}">${STATUS_LABEL[s.status]||s.status}</span>
          ${s.btag?`<span class="btag" data-copy="${esc(s.btag)}">${esc(s.btag)}</span>`:''}
          ${bossTags}${s.gold_to?`<span class="tag dest">→ ${esc(s.gold_to)}</span>`:''}
          ${s.run_date?`<span class="tag run">carry: ${fmtDate(s.run_date)}</span>`:''}
          ${s.created_by?`<span class="tag by">cargó: ${esc(s.created_by)}</span>`:''}${ops}</div>
        ${s.notes?`<div class="note">${esc(s.notes)}</div>`:''}</div>`;
    }).join('')+'</div>';
  return `<section class="panel ${R.cls}"><div class="phead"><h2><span class="dia"></span>${esc(R.name)}</h2><div class="sub">${esc(R.sub)}</div><div class="rtot"><b>${fmtGoldShort(raidGold)}</b><span>esta semana</span></div></div><div class="pbody">${bossRows}<div class="divider"></div>${saleHtml}</div></section>`;
}

function allSales(){ const out=[]; [...state.weeks].reverse().forEach(w=> w.sales.forEach(s=> out.push({...s, weekLabel:w.label, weekDate:w.date}))); return out; }
function periodMatch(dateStr){
  if(audFilter.period==='all') return true;
  const d=new Date(dateStr); const now=new Date();
  if(audFilter.period==='thisweek'){ const wk=curWeek(); return wk && dateStr && dateStr.slice(0,10)===String(wk.date).slice(0,10); }
  if(audFilter.period==='thismonth') return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  if(audFilter.period==='range'){ if(audFilter.from && dateStr.slice(0,10)<audFilter.from) return false; if(audFilter.to && dateStr.slice(0,10)>audFilter.to) return false; return true; }
  return true;
}
function filteredAudit(){ return allSales().filter(s=>{
  if(audFilter.raid!=='all' && s.raid!==audFilter.raid) return false;
  if(audFilter.status!=='all' && s.status!==audFilter.status) return false;
  if(!periodMatch(s.weekDate)) return false;
  if(audFilter.q){ const q=audFilter.q.toLowerCase(); if(!((s.buyer||'').toLowerCase().includes(q)||(s.btag||'').toLowerCase().includes(q)||(s.gold_to||'').toLowerCase().includes(q)||(s.created_by||'').toLowerCase().includes(q))) return false; }
  return true;
});}

function allKnownWclZones(){
  const byId=new Map(WCL_FALLBACK_ZONES.map(z=>[String(z.id),z]));
  (wclZones||[]).forEach(z=>byId.set(String(z.id),z));
  const active=wclActiveZoneIds(), order=new Map(active.map((id,i)=>[String(id),i]));
  return [...byId.values()].sort((a,b)=>{
    const ao=order.has(String(a.id))?0:1, bo=order.has(String(b.id))?0:1;
    if(ao!==bo) return ao-bo;
    const oi=(order.get(String(a.id))??999)-(order.get(String(b.id))??999); if(oi) return oi;
    return String(a.expansion_name||'').localeCompare(String(b.expansion_name||'')) || String(a.name||'').localeCompare(String(b.name||''));
  });
}

async function saveAdminApiConfig(){
  if(!cap('manageAdmin')) return toast('No tenés permiso para cambiar APIs');

  if(!zoneIds.length) return toast('Elegí al menos una zona WCL');

  const difficulties=[...document.querySelectorAll('.adminDiff:checked')].map(x=>Number(x.value)).filter(Boolean);
  if(!difficulties.length) return toast('Elegí al menos una dificultad');

  if(!metrics.length) return toast('Elegí al menos una métrica');
  const season=(document.getElementById('adminRioSeason').value||'current').trim()||'current';
  const intVal=(id,fallback,min=0,max=10080)=>{
    const n=Number(document.getElementById(id).value);
    if(!Number.isFinite(n)) return fallback;
    return Math.max(min,Math.min(max,Math.floor(n)));
  };
  const patch={
    wcl_active_zone_ids:zoneIds,
    wcl_mplus_zone_id:mplus,
    wcl_active_difficulties:difficulties,
    wcl_active_metrics:metrics,
    raiderio_season:season,
    armory_refresh_minutes:intVal('adminArmoryRefresh',DEFAULT_SYNC_SETTINGS.armory_refresh_minutes,1),
    armory_batch_size:intVal('adminArmoryBatch',DEFAULT_SYNC_SETTINGS.armory_batch_size,0),
    armory_batch_every_minutes:intVal('adminArmoryBatchEvery',DEFAULT_SYNC_SETTINGS.armory_batch_every_minutes,0),
    raiderio_refresh_minutes:intVal('adminRioRefresh',DEFAULT_SYNC_SETTINGS.raiderio_refresh_minutes,1),
    raiderio_batch_size:intVal('adminRioBatch',DEFAULT_SYNC_SETTINGS.raiderio_batch_size,0),
    raiderio_batch_every_minutes:intVal('adminRioBatchEvery',DEFAULT_SYNC_SETTINGS.raiderio_batch_every_minutes,0),
    wcl_refresh_minutes:intVal('adminWclRefresh',DEFAULT_SYNC_SETTINGS.wcl_refresh_minutes,1),
    wcl_batch_size:intVal('adminWclBatch',DEFAULT_SYNC_SETTINGS.wcl_batch_size,0),
    wcl_batch_every_minutes:intVal('adminWclBatchEvery',DEFAULT_SYNC_SETTINGS.wcl_batch_every_minutes,0)

  document.getElementById('f_weekWrap').style.display=cap('editAny')?'':'none';
  document.getElementById('f_byWrap').style.display=cap('editAny')?'':'none';
  let data={ raid:(preset&&preset.raid)||RAID_KEYS[0], buyer:'', btag:'', bosses:(preset&&preset.boss)?[preset.boss]:[], gold:0, status:opts[0], gold_to:'', notes:'', run_date:'', week_id:state.current, created_by:me() };
  if(id){ const ex=w.sales.find(s=>s.id===id); if(ex) data={...ex}; }
  document.getElementById('modalTitle').textContent=id?'Editar venta':'Registrar venta';
  sel.value=data.raid; wkSel.value=data.week_id||state.current;
  document.getElementById('f_buyer').value=data.buyer||''; document.getElementById('f_btag').value=data.btag||'';
  document.getElementById('f_by').value=data.created_by||me();
  document.getElementById('f_gold').value=data.gold?data.gold:''; document.getElementById('f_status').value=opts.includes(data.status)?data.status:opts[0];
  document.getElementById('f_goldto').value=data.gold_to||''; document.getElementById('f_notes').value=data.notes||'';
  document.getElementById('f_rundate').value=data.run_date?String(data.run_date).slice(0,10):'';
  buildBossPicker(data.raid,data.bosses||[]); sel.onchange=()=> buildBossPicker(sel.value,[]);
  document.getElementById('scrim').classList.add('on'); setTimeout(()=>document.getElementById('f_buyer').focus(),50); }
function closeSale(){ document.getElementById('scrim').classList.remove('on'); editingId=null; }
async function saveSaleFn(){ const raid=document.getElementById('f_raid').value; const bosses=[...document.querySelectorAll('#f_bosses input:checked')].map(c=>c.value); if(!bosses.length){ toast('Elegí al menos un boss'); return; }
  const val=id=>document.getElementById(id).value.trim(); const now=new Date().toISOString();
  const ex = editingId ? curWeek().sales.find(s=>s.id===editingId) : null;
  const week_id = cap('editAny') ? (document.getElementById('f_week').value||state.current) : (ex? ex.week_id : state.current);
  const base={ week_id, raid, buyer:val('f_buyer'), btag:val('f_btag'), bosses, gold:parseGold(document.getElementById('f_gold').value), status:document.getElementById('f_status').value, gold_to:val('f_goldto'), notes:val('f_notes'), run_date:document.getElementById('f_rundate').value||null };
  try{ if(editingId){ const patch={...base, updated_by:me(), updated_at:now}; if(cap('editAny')) patch.created_by = val('f_by')||(ex&&ex.created_by)||me(); await sbUpd('sales',editingId,patch); logAction('editar_venta','sale',editingId,{buyer:base.buyer,gold:base.gold}); }
    else{ const by = cap('editAny') ? (val('f_by')||me()) : me(); const rec={ id:uid(), ...base, created_by:by, updated_by:null, updated_at:null }; await sbIns('sales',rec); logAction('crear_venta','sale',rec.id,{buyer:base.buyer,gold:base.gold}); }
    closeSale(); await refresh(); toast(editingId?'Venta actualizada':'Venta registrada');
  }catch(e){ toast('No se pudo guardar (¿faltan columnas nuevas?)'); setLive('err','error'); } }
async function delSale(id){ const w=curWeek(); const s=w&&w.sales.find(x=>x.id===id); if(!cap('delSale')) return; if(s&&!confirm('¿Borrar la venta de "'+(s.buyer||'?')+'"?')) return;
  try{ await sbDel('sales',id); logAction('borrar_venta','sale',id,{buyer:s?s.buyer:'',gold:s?s.gold:0}); await refresh(); toast('Venta eliminada'); }catch(e){ toast('No se pudo borrar'); } }

/* ---------- generic small modal ---------- */
function openM2(title, bodyHtml, onOk){ document.getElementById('m2title').textContent=title; document.getElementById('m2body').innerHTML=bodyHtml; document.getElementById('scrim2').classList.add('on');
  document.getElementById('m2ok').onclick=async()=>{ const ok=await onOk(); if(ok!==false){ document.getElementById('scrim2').classList.remove('on'); } };
  setTimeout(()=>{ const f=document.querySelector('#m2body input'); if(f) f.focus(); },50); }
function closeM2(){ document.getElementById('scrim2').classList.remove('on'); }
function openChangePass(){ openM2('Cambiar mi contraseña',
  `<div class="field"><label>Contraseña actual</label><input type="password" id="cp_old"></div><div class="field"><label>Nueva contraseña</label><input type="password" id="cp_new"></div><div class="field"><label>Repetir nueva</label><input type="password" id="cp_new2"></div><div class="err" id="cp_err"></div>`,
  async()=>{ const o=document.getElementById('cp_old').value,n=document.getElementById('cp_new').value,n2=document.getElementById('cp_new2').value; const err=document.getElementById('cp_err'); err.textContent='';
    if(!n||n.length<10){ err.textContent='La nueva debe tener al menos 10 caracteres.'; return false; } if(n!==n2){ err.textContent='No coinciden.'; return false; }
    try{ await authRequest('change_password',{old_password:o,new_password:n}); logAction('cambiar_pass','user',session.id,{target:'propia'}); await doLogout(true); toast('Contraseña cambiada. Volvé a iniciar sesión.'); }catch(e){ err.textContent=e.message||'No se pudo guardar.'; return false; } }); }
function openResetPass(uidv){ const u=users.find(x=>x.id===uidv); openM2('Reset contraseña · '+u.username,
  `<p class="hint">Le ponés una contraseña nueva a <b>${esc(u.username)}</b>. Después que la cambie por una suya.</p><div class="field"><label>Nueva contraseña</label><input type="password" id="rp_new"></div><div class="err" id="rp_err"></div>`,
  async()=>{ const n=document.getElementById('rp_new').value; const err=document.getElementById('rp_err'); if(!n||n.length<10){ err.textContent='Mínimo 10 caracteres.'; return false; } try{ await authRequest('reset_password',{user_id:u.id,password:n}); logAction('cambiar_pass','user',u.id,{target:u.username}); toast('Contraseña reseteada'); }catch(e){ err.textContent=e.message||'No se pudo.'; return false; } }); }
function openNewUser(){ openM2('Nuevo usuario',
  `<div class="field"><label>Usuario</label><input type="text" id="nu_user"></div><div class="field"><label>Contraseña</label><input type="password" id="nu_pass"></div><div class="field"><label>Rol</label><select id="nu_role">${Object.keys(ROLE_LABEL).map(r=>`<option value="${r}">${ROLE_LABEL[r]}</option>`).join('')}</select></div><div class="err" id="nu_err"></div>`,
  async()=>{ const un=document.getElementById('nu_user').value.trim(), pw=document.getElementById('nu_pass').value, rl=document.getElementById('nu_role').value; const err=document.getElementById('nu_err'); err.textContent='';
    if(!un||!pw){ err.textContent='Completá usuario y contraseña.'; return false; } if(users.find(x=>x.username.toLowerCase()===un.toLowerCase())){ err.textContent='Ese usuario ya existe.'; return false; }
    if(pw.length<10){ err.textContent='La contraseña debe tener al menos 10 caracteres.'; return false; }
    try{ await authRequest('create_user',{username:un,password:pw,role:rl}); logAction('crear_usuario','user',un,{target:un+' ('+ROLE_LABEL[rl]+')'}); await refresh(); toast('Usuario creado'); }catch(e){ err.textContent=e.message||'No se pudo crear.'; return false; } }); }

/* ---------- user menu ---------- */
function openUserMenu(e){ const m=document.getElementById('userMenu'); const r=document.getElementById('uchip').getBoundingClientRect();
  m.innerHTML=`<div class="mi head">${esc(session.username)} · ${ROLE_LABEL[role()]}</div><div class="mi" id="mi_pass">Cambiar mi contraseña</div><div class="mi" id="mi_out">Cerrar sesión</div>`;
  m.style.top=(r.bottom+8+window.scrollY)+'px'; m.style.left=Math.max(12,(r.right-200))+'px'; m.classList.add('on');
  document.getElementById('mi_pass').onclick=()=>{ m.classList.remove('on'); openChangePass(); };
  document.getElementById('mi_out').onclick=()=>{ m.classList.remove('on'); doLogout(); };
  e.stopPropagation(); }
document.addEventListener('click',e=>{ const m=document.getElementById('userMenu'); if(m.classList.contains('on') && !e.target.closest('#userMenu') && !e.target.closest('#uchip')) m.classList.remove('on'); });

/* ---------- copy ---------- */
function copyText(t){ if(navigator.clipboard){ navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t)); } else fallbackCopy(t); }
function fallbackCopy(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); }
function copyVacancies(){ const w=curWeek(); if(!w){ toast('No hay semana activa'); return; } let lines=[`WTS Carries Míticos — ${w.label}  ·  PROTOTYPE (US-Quel'Thalas)`];
  RAID_KEYS.forEach(k=>{ const open=RAIDS[k].bosses.map(b=>{ const v=((w.slots[k]||{})[b]??DEFAULT_SLOTS)-soldFor(w,k,b); return v>0?`${b} (${v})`:null; }).filter(Boolean); if(open.length) lines.push(`\n${RAIDS[k].name}: `+open.join(' · ')); });
  if(lines.length===1) lines.push('\nSin vacantes abiertas — todo vendido.'); copyText(lines.join('')); toast('Vacantes copiadas'); }

/* ---------- wire ---------- */
document.getElementById('saveSale').onclick=saveSaleFn;
document.getElementById('cancelSale').onclick=closeSale;
document.getElementById('scrim').onclick=e=>{ if(e.target.id==='scrim') closeSale(); };
document.getElementById('pickAll').onclick=()=>{ document.querySelectorAll('#f_bosses input[type=checkbox]').forEach(cb=>{ cb.checked=true; cb.closest('label').classList.add('has'); }); };
document.getElementById('m2cancel').onclick=closeM2;
document.getElementById('scrim2').onclick=e=>{ if(e.target.id==='scrim2') closeM2(); };
document.getElementById('copyVacAll').onclick=copyVacancies;
document.getElementById('lg_btn').onclick=doLogin;
document.getElementById('lg_pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('lg_user').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('lg_pass').focus(); });
document.getElementById('lg_guestbtn').onclick=()=>{ forceLogin=false; gate(); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeSale(); closeM2(); } });

/* ---------- boot ---------- */
function showSetup(){ document.getElementById('app').style.display=''; document.getElementById('content').innerHTML=`<div class="setup"><h2>Falta conectar la base</h2><p>Pegá tu <code>SUPABASE_URL</code> y <code>SUPABASE_KEY</code> arriba del archivo, y corré el SQL nuevo (tablas users, app_settings, audit_log).</p></div>`; setLive('err','sin configurar'); }
async function boot(){
  if(!configured()){ showSetup(); return; }
  localStorage.removeItem('pt_session');
  if(session&&session.token){
    try{ const valid=await authRequest('session'); session={...valid.user,token:session.token,expires_at:session.expires_at}; sessionStorage.setItem('pt_secure_session',JSON.stringify(session)); }
    catch(e){ session=null; sessionStorage.removeItem('pt_secure_session'); }
  }
  if(!session){ gate(); setLive('ok','listo'); return; }
  try{ await fetchAll(); }catch(e){ if(e.status===401){ await doLogout(true); return; } document.getElementById('app').style.display=''; setLive('err','sin conexión'); showError('No se pudo conectar con el gateway seguro. Verificá SQL 019 y las funciones <code>app-auth</code>/<code>app-api</code>.'); return; }
  await ensureFirstWeek(); await fetchAll();
  lastSig=dataSig(); gate();
  setInterval(()=>{ const busy=document.hidden||document.getElementById('scrim').classList.contains('on')||document.getElementById('scrim2').classList.contains('on')||document.getElementById('login').classList.contains('on')||(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)); if(!busy) refresh(true); },60000);
}
boot();
</script>
