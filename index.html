<!-- PROTOTYPE · US-Quel'Thalas — Registro de Carries (online, con roles y auditoría) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTOTYPE · Registro de Carries</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg:#06080b; --bg-1:#0c1116; --bg-2:#121a21; --bg-3:#19242d;
    --line:#1f2c36; --line-soft:#161f27;
    --blue:#009BDB; --blue-2:#33b6e8; --blue-dim:#0a6e9b;
    --white:#ffffff; --text:#e7eef4; --muted:#8a9caa; --muted-2:#566671;
    --gold:#f0c14b; --ok:#2fbf71; --warn:#e8a13a; --rose:#e8556b;
    --font-display:'Montserrat',system-ui,sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
    --font-mono:'Space Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-body); color:var(--text);
    background:
      radial-gradient(800px 460px at 88% -12%, rgba(0,155,219,.16), transparent 60%),
      radial-gradient(620px 460px at -5% 108%, rgba(0,155,219,.07), transparent 55%),
      var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.45;}
  .wrap{max-width:1200px; margin:0 auto; padding:20px 18px 70px}

  header.top{display:flex; flex-wrap:wrap; gap:14px 20px; align-items:center; justify-content:space-between; padding-bottom:16px; border-bottom:1px solid var(--line-soft)}
  .brand{display:flex; align-items:center; gap:14px}
  .brand img{width:50px; height:50px; display:block; filter:drop-shadow(0 3px 10px rgba(0,155,219,.35))}
  .brand .txt h1{font-family:var(--font-display); font-weight:700; letter-spacing:.34em; text-transform:uppercase; font-size:clamp(17px,2.4vw,23px); margin:0; line-height:1}
  .brand .txt p{margin:5px 0 0; color:var(--muted); font-size:11px; letter-spacing:.22em; text-transform:uppercase; font-weight:500}
  .brand .txt p b{color:var(--blue); font-weight:600}
  .hright{display:flex; align-items:center; gap:12px}
  .live{display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted-2); font-family:var(--font-mono)}
  .live .dot{width:8px; height:8px; border-radius:50%; background:var(--muted-2); transition:.2s}
  .live.ok .dot{background:var(--ok); box-shadow:0 0 8px var(--ok)}
  .live.err .dot{background:var(--rose); box-shadow:0 0 8px var(--rose)}
  .live.pulse .dot{animation:pulse .6s ease}
  @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.7)}100%{transform:scale(1)}}

  .btn{font-family:var(--font-body); font-weight:600; font-size:13px; cursor:pointer; border-radius:9px; padding:9px 15px; border:1px solid var(--line); background:var(--bg-2); color:var(--text); transition:.15s; white-space:nowrap}
  .btn:hover{border-color:var(--blue); background:var(--bg-3)}
  .btn.primary{border-color:transparent; color:#021018; font-weight:700; background:linear-gradient(120deg,#2bb6e8,#009BDB); box-shadow:0 6px 20px -8px rgba(0,155,219,.8)}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:7px 11px; font-size:12px}
  .btn.danger:hover{border-color:var(--rose); color:var(--rose)}
  .iconbtn{width:38px; height:38px; border-radius:9px; border:1px solid var(--line); cursor:pointer; background:var(--bg-2); color:var(--text); font-size:17px; display:grid; place-items:center; transition:.15s}
  .iconbtn:hover{border-color:var(--blue); color:var(--blue); background:var(--bg-3)}
  .iconbtn:disabled{opacity:.32; cursor:not-allowed}
  .actions{display:flex; gap:9px; flex-wrap:wrap}
  .adminpill{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--blue); border:1px solid var(--blue-dim); background:rgba(0,155,219,.1); padding:7px 11px; border-radius:9px; cursor:pointer}
  .adminpill.off{color:var(--muted-2); border-color:var(--line); background:transparent}
  .adminpill::before{content:""; width:8px; height:8px; transform:rotate(45deg); background:currentColor; display:inline-block}

  .tabs{display:flex; gap:6px; margin:18px 0 4px; border-bottom:1px solid var(--line-soft); padding-bottom:0}
  .tab{font-family:var(--font-display); font-weight:600; font-size:12.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); padding:11px 16px; cursor:pointer; border-bottom:2px solid transparent; transition:.15s; display:flex; align-items:center; gap:8px}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--white); border-color:var(--blue)}
  .tab .dia{width:7px; height:7px; transform:rotate(45deg); background:var(--blue); opacity:0; transition:.15s}
  .tab.on .dia{opacity:1}

  .banner{display:none; margin:16px 0 0; padding:12px 16px; border-radius:11px; border:1px solid var(--rose); background:rgba(232,85,107,.1); color:#ffd9df; font-size:13px}
  .banner.on{display:block}
  .banner code{font-family:var(--font-mono); color:#fff}

  .wbar{display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; margin:16px 0 4px}
  .weeknav{display:flex; align-items:center; gap:8px}
  .weeknav .wk{min-width:180px; text-align:center; padding:8px 14px; border:1px solid var(--line); border-radius:10px; background:var(--bg-1)}
  .weeknav .wk .lbl{font-weight:600; font-size:14px}
  .weeknav .wk .dt{font-size:11px; color:var(--muted-2); font-family:var(--font-mono)}

  .summary{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:16px 0 8px}
  .stat{border:1px solid var(--line-soft); border-radius:12px; padding:13px 15px; background:var(--bg-1); position:relative; overflow:hidden}
  .stat::after{content:""; position:absolute; right:-10px; top:-10px; width:26px; height:26px; transform:rotate(45deg); background:rgba(0,155,219,.08)}
  .stat .k{font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted-2)}
  .stat .v{font-family:var(--font-mono); font-weight:700; font-size:19px; margin-top:4px}
  .stat .v.gold{color:var(--gold)} .stat .v.blue{color:var(--blue)} .stat .v.ok{color:var(--ok)}

  .raids{display:grid; grid-template-columns:1.15fr 1fr; gap:18px; margin-top:14px; align-items:start}
  .panel{border:1px solid var(--line-soft); border-radius:14px; background:var(--bg-1); overflow:hidden}
  .phead{padding:14px 18px 12px; border-bottom:1px solid var(--line-soft); position:relative}
  .phead::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--blue)}
  .panel.chimaerus .phead::before{background:linear-gradient(var(--white),var(--blue))}
  .phead h2{font-family:var(--font-display); font-weight:700; letter-spacing:.14em; text-transform:uppercase; font-size:15px; margin:0; display:flex; align-items:center; gap:9px}
  .phead h2 .dia{width:9px; height:9px; transform:rotate(45deg); background:var(--blue)}
  .phead .sub{color:var(--muted); font-size:11.5px; margin-top:3px; font-family:var(--font-mono)}
  .phead .rtot{position:absolute; right:18px; top:14px; text-align:right}
  .phead .rtot b{font-family:var(--font-mono); color:var(--gold); font-size:15px}
  .phead .rtot span{display:block; font-size:9.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:.1em}
  .pbody{padding:8px 10px 14px}

  .boss{display:flex; align-items:center; gap:12px; padding:9px 10px; border-radius:9px}
  .boss:hover{background:var(--bg-2)}
  .boss .bn{flex:1; min-width:0}
  .boss .bn .nm{font-weight:600; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .boss .bn .meta{font-size:11px; color:var(--muted-2); margin-top:1px}
  .pips{display:flex; gap:4px}
  .pip{width:13px; height:13px; transform:rotate(45deg); border:1px solid var(--line); background:var(--bg); transition:.18s}
  .pip.sold{border-color:transparent; background:var(--blue); box-shadow:0 0 8px -1px rgba(0,155,219,.8)}
  .pip.over{background:var(--rose); box-shadow:0 0 8px -1px rgba(232,85,107,.7)}
  .vstate{font-size:11px; font-weight:700; letter-spacing:.03em; min-width:76px; text-align:right; font-family:var(--font-mono)}
  .vstate.open{color:var(--blue)} .vstate.full{color:var(--muted-2)} .vstate.over{color:var(--rose)}
  .slotin{width:40px; padding:5px 6px; text-align:center; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:12px}
  .slotin:focus{outline:none; border-color:var(--blue)}
  .slotstat{width:40px; text-align:center; font-family:var(--font-mono); font-size:13px; color:var(--muted)}
  .slothint{font-size:10px; color:var(--muted-2); text-align:center; margin-top:1px}
  .divider{height:1px; background:var(--line-soft); margin:10px 8px}

  .salelist{display:flex; flex-direction:column; gap:8px; padding:0 8px}
  .sale{border:1px solid var(--line-soft); border-radius:10px; padding:10px 12px; background:var(--bg-2)}
  .sale .r1{display:flex; align-items:center; gap:8px; justify-content:space-between}
  .sale .buyer{font-weight:600; font-size:14px}
  .sale .price{font-family:var(--font-mono); font-weight:700; color:var(--gold); font-size:14px; white-space:nowrap}
  .sale .r2{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:7px}
  .tag{font-family:var(--font-mono); font-size:10.5px; padding:2px 7px; border-radius:6px; background:var(--bg); border:1px solid var(--line); color:var(--muted)}
  .tag.boss{color:#bfe6f7; border-color:#16384a}
  .tag.dest{color:var(--gold); border-color:#5a4a1e}
  .btag{font-family:var(--font-mono); font-size:11px; color:var(--blue); cursor:pointer; border:1px dashed var(--blue-dim); border-radius:6px; padding:2px 7px; background:rgba(0,155,219,.07)}
  .btag:hover{background:rgba(0,155,219,.16)}
  .badge{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:2px 8px; border-radius:20px}
  .badge.reservado{color:var(--warn); background:rgba(232,161,58,.12); border:1px solid rgba(232,161,58,.35)}
  .badge.senado{color:var(--blue); background:rgba(0,155,219,.12); border:1px solid rgba(0,155,219,.4)}
  .badge.pagado{color:var(--ok); background:rgba(47,191,113,.13); border:1px solid rgba(47,191,113,.4)}
  .sale .note{font-size:12px; color:var(--muted); margin-top:6px; font-style:italic}
  .sale .ops{display:flex; gap:6px; margin-left:auto}
  .miniop{font-size:11px; color:var(--muted-2); cursor:pointer; padding:2px 6px; border-radius:6px}
  .miniop:hover{color:var(--text); background:var(--bg)}
  .miniop.del:hover{color:var(--rose)}
  .empty{padding:18px 12px; text-align:center; color:var(--muted-2); font-size:13px}
  .empty b{display:block; color:var(--muted); font-weight:600; margin-bottom:3px}

  .calgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-top:16px}
  .wcard{border:1px solid var(--line-soft); border-radius:12px; background:var(--bg-1); padding:14px 15px; cursor:pointer; transition:.15s; position:relative; overflow:hidden}
  .wcard:hover{border-color:var(--blue); transform:translateY(-2px)}
  .wcard.cur{border-color:var(--blue); box-shadow:0 0 0 1px var(--blue) inset}
  .wcard .wl{font-family:var(--font-display); font-weight:700; letter-spacing:.05em; font-size:15px}
  .wcard .wd{font-family:var(--font-mono); font-size:11px; color:var(--muted-2); margin-top:2px}
  .wcard .wm{display:flex; gap:14px; margin-top:12px; flex-wrap:wrap}
  .wcard .wm div{font-size:11px; color:var(--muted)}
  .wcard .wm b{display:block; font-family:var(--font-mono); font-size:16px; margin-top:1px}
  .wcard .wm b.gold{color:var(--gold)} .wcard .wm b.blue{color:var(--blue)}
  .wcard .adminrow{margin-top:12px; display:flex; gap:8px}

  .audbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:16px}
  .audbar select, .audbar input{padding:8px 11px; border-radius:9px; border:1px solid var(--line); background:var(--bg-1); color:var(--text); font-family:var(--font-body); font-size:13px}
  .audbar input{min-width:180px}
  .audbar .spacer{flex:1}
  .audsum{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin:14px 0}
  .tablewrap{overflow:auto; border:1px solid var(--line-soft); border-radius:12px; margin-top:6px}
  table.aud{width:100%; border-collapse:collapse; font-size:12.5px; min-width:880px}
  table.aud th{text-align:left; font-family:var(--font-display); font-weight:600; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); padding:11px 12px; background:var(--bg-1); border-bottom:1px solid var(--line); position:sticky; top:0}
  table.aud td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:top}
  table.aud tr:hover td{background:var(--bg-1)}
  table.aud .g{font-family:var(--font-mono); color:var(--gold); font-weight:700; white-space:nowrap}
  table.aud .mono{font-family:var(--font-mono); color:var(--muted)}
  .destbox{margin-top:18px; border:1px solid var(--line-soft); border-radius:12px; background:var(--bg-1); padding:14px 16px}
  .destbox h4{font-family:var(--font-display); font-weight:600; letter-spacing:.1em; text-transform:uppercase; font-size:12px; margin:0 0 10px; color:var(--muted)}
  .destrow{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line-soft); font-size:13px}
  .destrow:last-child{border:0}
  .destrow .g{font-family:var(--font-mono); color:var(--gold); font-weight:700}

  .scrim{position:fixed; inset:0; background:rgba(3,5,8,.74); backdrop-filter:blur(4px); display:none; place-items:center; padding:18px; z-index:50}
  .scrim.on{display:grid}
  .modal{width:100%; max-width:520px; max-height:92vh; overflow:auto; border:1px solid var(--line); border-radius:16px; background:var(--bg-1); box-shadow:0 30px 80px -20px rgba(0,0,0,.85)}
  .modal.sm{max-width:380px}
  .modal h3{font-family:var(--font-display); font-weight:700; letter-spacing:.1em; text-transform:uppercase; font-size:15px; margin:0; padding:18px 20px 14px; border-bottom:1px solid var(--line-soft)}
  .mbody{padding:16px 20px}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted-2); margin-bottom:6px}
  .field input, .field select, .field textarea{width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--blue)}
  .field textarea{resize:vertical; min-height:54px}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .bosspick{display:flex; flex-direction:column; gap:6px}
  .bosspick .pkrow{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .bosspick label.cb{display:flex; align-items:center; gap:9px; padding:8px 10px; border:1px solid var(--line-soft); border-radius:9px; cursor:pointer; font-size:13.5px; flex:1}
  .bosspick label.cb:hover{border-color:var(--blue)}
  .bosspick label.cb.has{border-color:var(--blue-dim); background:rgba(0,155,219,.06)}
  .bosspick input{accent-color:var(--blue); width:16px; height:16px}
  .bosspick .full{font-size:10px; color:var(--rose); font-family:var(--font-mono)}
  .linkbtn{background:none; border:none; color:var(--blue); font-family:var(--font-body); font-size:12px; cursor:pointer; padding:0; text-decoration:underline}
  .mfoot{display:flex; gap:10px; justify-content:flex-end; padding:14px 20px 18px; border-top:1px solid var(--line-soft)}
  .hint{font-size:12px; color:var(--muted); margin:-4px 0 14px}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-3); border:1px solid var(--blue); color:var(--text); padding:11px 18px; border-radius:10px; font-size:13px; opacity:0; transition:.25s; z-index:60; pointer-events:none}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
  footer.foot{margin-top:26px; padding-top:16px; border-top:1px solid var(--line-soft); display:flex; gap:14px; flex-wrap:wrap; justify-content:space-between; align-items:center; color:var(--muted-2); font-size:12px}

  .setup{max-width:680px; margin:40px auto; border:1px solid var(--line); border-radius:16px; background:var(--bg-1); padding:28px 30px}
  .setup h2{font-family:var(--font-display); font-weight:700; letter-spacing:.1em; text-transform:uppercase; font-size:17px; margin:0 0 6px}
  .setup p{color:var(--muted); font-size:13.5px}
  .setup ol{color:var(--text); font-size:13.5px; line-height:1.7; padding-left:20px}
  .setup code{font-family:var(--font-mono); background:var(--bg); border:1px solid var(--line); padding:1px 6px; border-radius:5px; color:var(--blue); font-size:12px}

  @media(max-width:860px){
    .summary{grid-template-columns:repeat(2,1fr)}
    .raids{grid-template-columns:1fr}
    .brand .txt h1{letter-spacing:.2em}
  }
</style>

<div class="wrap" id="app">

const configured = ()=> !SUPABASE_URL.includes('TU-PROYECTO') && !SUPABASE_KEY.includes('TU-PUBLISHABLE') && !SUPABASE_KEY.includes('TU-ANON');
const H = ()=>{ const h={ apikey:SUPABASE_KEY, 'Content-Type':'application/json' }; if(SUPABASE_KEY.startsWith('eyJ')) h.Authorization='Bearer '+SUPABASE_KEY; return h; };
async function sb(path, opts={}){ const r = await fetch(SUPABASE_URL+'/rest/v1/'+path, { ...opts, headers:{...H(), ...(opts.headers||{})} }); if(!r.ok){ throw new Error(r.status+' '+(await r.text())); } return r.status===204 ? null : r.json(); }
const sbSelect = (t)=> sb(t+'?select=*');
const sbInsert = (t,row)=> sb(t, {method:'POST', headers:{Prefer:'return=representation'}, body:JSON.stringify(row)});
const sbUpdate = (t,id,patch)=> sb(t+'?id=eq.'+encodeURIComponent(id), {method:'PATCH', body:JSON.stringify(patch)});
const sbDelete = (t,id)=> sb(t+'?id=eq.'+encodeURIComponent(id), {method:'DELETE'});

function setLive(cls, txt){ const el=document.getElementById('live'); el.className='live '+cls; document.getElementById('liveTxt').textContent=txt; if(cls==='ok'){ el.classList.add('pulse'); setTimeout(()=>el.classList.remove('pulse'),600);} }
function showError(msg){ const b=document.getElementById('banner'); b.classList.add('on'); b.innerHTML=msg; }
function clearError(){ document.getElementById('banner').classList.remove('on'); }

const uid = ()=> (Date.now().toString(36)+Math.random().toString(36).slice(2,7));
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(d){ const dt=new Date(d); return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0'); }
function fmtGold(n){ return new Intl.NumberFormat('es-AR').format(Math.round(n||0))+'g'; }
function fmtGoldShort(n){ n=Math.round(n||0); if(n>=1e6) return (n/1e6).toFixed(n%1e6?1:0).replace('.',',')+'M g'; if(n>=1e3) return Math.round(n/1e3)+'k g'; return n+' g'; }
function parseGold(str){ if(str==null) return 0; str=String(str).trim().toLowerCase().replace(/\s/g,'').replace(/g$/,''); if(!str) return 0;
  let m=1; if(str.endsWith('m')){m=1e6;str=str.slice(0,-1);} else if(str.endsWith('k')){m=1e3;str=str.slice(0,-1);}
  if((str.match(/\./g)||[]).length>1) str=str.replace(/\./g,''); str=str.replace(',', '.'); const n=parseFloat(str); return isNaN(n)?0:Math.round(n*m); }
function blankSlots(){ const s={}; RAID_KEYS.forEach(k=>{ s[k]={}; RAIDS[k].bosses.forEach(b=> s[k][b]=DEFAULT_SLOTS); }); return s; }
function curWeek(){ return state.weeks.find(w=>w.id===state.current); }
function soldFor(week, raidKey, boss){ return week.sales.filter(s=>s.raid===raidKey && (s.bosses||[]).includes(boss)).length; }
function canRefresh(){ return !document.getElementById('scrim').classList.contains('on') && !document.getElementById('scrimPin').classList.contains('on') && !(document.activeElement && document.activeElement.tagName && (document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA')); }

async function fetchAll(){
  const [weeks, sales] = await Promise.all([ sbSelect('weeks'), sbSelect('sales') ]);
  weeks.sort((a,b)=> (a.date||'').localeCompare(b.date||'') || (a.created_at||'').localeCompare(b.created_at||''));
  weeks.forEach(w=>{ w.slots=w.slots||blankSlots(); w.sales=sales.filter(s=>s.week_id===w.id); });
  state.weeks=weeks;
  if(!state.current || !state.weeks.find(w=>w.id===state.current)) state.current = state.weeks.length ? state.weeks[state.weeks.length-1].id : null;
}
function dataSig(){ return JSON.stringify(state.weeks.map(w=>[w.id,w.label,w.date,w.slots,w.sales])); }
async function refresh(toastOnChange){
  try{ await fetchAll(); clearError(); setLive('ok','en vivo');
    const sig=dataSig(); if(sig!==lastSig){ lastSig=sig; render(); if(toastOnChange) toast('Actualizado'); }
  }catch(e){ setLive('err','sin conexión'); showError('No se pudo conectar. Revisá <code>SUPABASE_URL</code> / <code>SUPABASE_KEY</code> y que corriste el SQL. <code>'+esc(String(e.message).slice(0,140))+'</code>'); }
}
async function ensureFirstWeek(){
  if(state.weeks.length || creating) return; creating=true;
  const w={ id:uid(), label:"Lockout "+fmtDate(new Date()), date:new Date().toISOString().slice(0,10), slots:blankSlots() };
  try{ await sbInsert('weeks', w); await fetchAll(); state.current=w.id; }catch(e){} creating=false;
}

let toastT; function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),1900); }

function render(){
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('on', t.dataset.view===view));
  document.getElementById('copyVacAll').style.display = view==='semana' ? '' : 'none';
  if(view==='semana') renderSemana(); else if(view==='calendario') renderCalendario(); else renderAuditoria();
}

function renderSemana(){
  const c=document.getElementById('content');
  if(!state.current){ c.innerHTML='<div class="empty" style="padding:60px"><b>Sin semanas todavía</b>'+(isAdmin()?'Creá la primera con “+ Semana”.':'Esperá a que el admin cree la primera semana.')+'</div>'+(isAdmin()?'<div style="text-align:center"><button class="btn primary" onclick="addWeek()">+ Semana</button></div>':''); return; }
  const w=curWeek(); const idx=state.weeks.findIndex(x=>x.id===state.current);
  const totalGold=w.sales.reduce((a,s)=>a+(s.gold||0),0);
  const paidGold=w.sales.filter(s=>s.status==='pagado').reduce((a,s)=>a+(s.gold||0),0);
  let openSlots=0; RAID_KEYS.forEach(k=>RAIDS[k].bosses.forEach(b=>{ openSlots+=Math.max(0,((w.slots[k]||{})[b]??DEFAULT_SLOTS)-soldFor(w,k,b)); }));
  let html=`<div class="wbar">
    <div class="weeknav">
      <button class="iconbtn" id="prevW" ${idx<=0?'disabled':''}>‹</button>
      <div class="wk"><div class="lbl">${esc(w.label)}</div><div class="dt">reset ${fmtDate(w.date)}</div></div>
      <button class="iconbtn" id="nextW" ${idx>=state.weeks.length-1?'disabled':''}>›</button>
    </div>
    <div class="actions">
      ${isAdmin()?`<button class="btn ghost sm" id="renameW">✎ Semana</button><button class="btn ghost sm danger" id="delW">🗑</button><button class="btn ghost" id="newW">+ Semana</button>`:``}
      <button class="btn primary" id="openSale">+ Venta</button>
    </div>
  </div>
  <div class="summary">
    <div class="stat"><div class="k">Gold de la semana</div><div class="v gold">${fmtGold(totalGold)}</div></div>
    <div class="stat"><div class="k">Ya cobrado</div><div class="v ok">${fmtGold(paidGold)}</div></div>
    <div class="stat"><div class="k">Ventas</div><div class="v">${w.sales.length}</div></div>
    <div class="stat"><div class="k">Vacantes abiertas</div><div class="v blue">${openSlots}</div></div>
  </div><div class="raids">`;
  RAID_KEYS.forEach(k=> html+=renderRaid(k,w)); html+=`</div>`;
  c.innerHTML=html;
  document.getElementById('prevW').onclick=()=>{ if(idx>0){ state.current=state.weeks[idx-1].id; render(); } };
  document.getElementById('nextW').onclick=()=>{ if(idx<state.weeks.length-1){ state.current=state.weeks[idx+1].id; render(); } };
  document.getElementById('openSale').onclick=()=>openSale(null);
  if(isAdmin()){
    document.getElementById('newW').onclick=addWeek;
    document.getElementById('renameW').onclick=renameWeek;
    document.getElementById('delW').onclick=deleteWeek;
    document.querySelectorAll('.slotin').forEach(inp=> inp.onchange=async()=>{
      const v=Math.max(0,parseInt(inp.value)||0); const wk=curWeek();
      wk.slots[inp.dataset.raid]=wk.slots[inp.dataset.raid]||{}; wk.slots[inp.dataset.raid][inp.dataset.boss]=v; renderSemana();
      try{ await sbUpdate('weeks', wk.id, { slots:wk.slots }); lastSig=dataSig(); setLive('ok','en vivo'); }catch(e){ setLive('err','error'); }
    });
  }
  document.querySelectorAll('.btag').forEach(b=> b.onclick=()=>{ copyText(b.dataset.copy); toast('Copiado: '+b.dataset.copy); });
  document.querySelectorAll('.miniop.edit').forEach(b=> b.onclick=()=>openSale(b.dataset.id));
  document.querySelectorAll('.miniop.del').forEach(b=> b.onclick=()=>delSale(b.dataset.id));
}

function renderRaid(k,w){
  const R=RAIDS[k]; const raidGold=w.sales.filter(s=>s.raid===k).reduce((a,s)=>a+(s.gold||0),0);
  let bossRows='';
  R.bosses.forEach(b=>{
    const total=(w.slots[k]||{})[b]??DEFAULT_SLOTS; const sold=soldFor(w,k,b); const vac=total-sold;
    let pips=''; const shown=Math.max(total,sold);
    for(let i=0;i<shown;i++){ const cls=i<sold?(i<total?'sold':'over'):''; pips+=`<span class="pip ${cls}"></span>`; }
    let st,scls; if(vac>0){st=vac+' vacante'+(vac>1?'s':'');scls='open';} else if(vac===0){st='completo';scls='full';} else{st='+'+(-vac)+' extra';scls='over';}
    const slotCell = isAdmin()
      ? `<input class="slotin" type="number" min="0" value="${total}" data-raid="${k}" data-boss="${esc(b)}"><div class="slothint">cupos</div>`
      : `<div class="slotstat">${total}</div><div class="slothint">cupos</div>`;
    bossRows+=`<div class="boss"><div class="bn"><div class="nm">${esc(b)}</div><div class="meta">${sold}/${total} vendidas</div></div>
      <div class="pips">${pips}</div><div class="vstate ${scls}">${st}</div><div>${slotCell}</div></div>`;
  });
  const sales=w.sales.filter(s=>s.raid===k);
  let saleHtml = !sales.length ? `<div class="empty"><b>Sin ventas todavía</b>Tocá “+ Venta” para anotar un comprador.</div>`
    : '<div class="salelist">'+sales.map(s=>{
      const bossTags=(s.bosses||[]).length===R.bosses.length?'<span class="tag boss">CLEAR COMPLETO</span>':(s.bosses||[]).map(b=>`<span class="tag boss">${esc(b)}</span>`).join('');
      const stLabel={reservado:'Reservado',senado:'Señado',pagado:'Pagado'}[s.status]||s.status;
      return `<div class="sale"><div class="r1"><span class="buyer">${esc(s.buyer)||'(sin nombre)'}</span><span class="price">${fmtGold(s.gold)}</span></div>
        <div class="r2"><span class="badge ${s.status}">${stLabel}</span>
          ${s.btag?`<span class="btag" data-copy="${esc(s.btag)}">${esc(s.btag)}</span>`:''}
          ${bossTags}${s.gold_to?`<span class="tag dest">→ ${esc(s.gold_to)}</span>`:''}
          <span class="ops"><span class="miniop edit" data-id="${s.id}">editar</span><span class="miniop del" data-id="${s.id}">borrar</span></span></div>
        ${s.notes?`<div class="note">${esc(s.notes)}</div>`:''}</div>`;
    }).join('')+'</div>';
  return `<section class="panel ${R.cls}"><div class="phead"><h2><span class="dia"></span>${esc(R.name)}</h2><div class="sub">${esc(R.sub)}</div>
    <div class="rtot"><b>${fmtGoldShort(raidGold)}</b><span>esta semana</span></div></div>
    <div class="pbody">${bossRows}<div class="divider"></div>${saleHtml}</div></section>`;
}

function renderCalendario(){
  const c=document.getElementById('content');
  if(!state.weeks.length){ c.innerHTML='<div class="empty" style="padding:60px"><b>Sin semanas todavía</b></div>'; return; }
  const cards=[...state.weeks].reverse().map(w=>{
    const total=w.sales.reduce((a,s)=>a+(s.gold||0),0);
    const paid=w.sales.filter(s=>s.status==='pagado').reduce((a,s)=>a+(s.gold||0),0);
    let slots=0,sold=0; RAID_KEYS.forEach(k=>RAIDS[k].bosses.forEach(b=>{ slots+=(w.slots[k]||{})[b]??DEFAULT_SLOTS; sold+=soldFor(w,k,b); }));
    return `<div class="wcard ${w.id===state.current?'cur':''}" data-id="${w.id}">
      <div class="wl">${esc(w.label)}</div><div class="wd">reset ${fmtDate(w.date)}</div>
      <div class="wm">
        <div>Gold<b class="gold">${fmtGoldShort(total)}</b></div>
        <div>Cobrado<b>${fmtGoldShort(paid)}</b></div>
        <div>Ventas<b>${w.sales.length}</b></div>
        <div>Cupos<b class="blue">${sold}/${slots}</b></div>
      </div>
      ${isAdmin()?`<div class="adminrow"><button class="btn ghost sm" data-act="open" data-id="${w.id}">Abrir</button><button class="btn ghost sm danger" data-act="del" data-id="${w.id}">Borrar</button></div>`:''}
    </div>`;
  }).join('');
  c.innerHTML=`<div class="calgrid">${cards}</div>`;
  document.querySelectorAll('.wcard').forEach(card=> card.onclick=(e)=>{ if(e.target.dataset.act) return; state.current=card.dataset.id; view='semana'; render(); });
  document.querySelectorAll('[data-act="open"]').forEach(b=> b.onclick=()=>{ state.current=b.dataset.id; view='semana'; render(); });
  document.querySelectorAll('[data-act="del"]').forEach(b=> b.onclick=()=> deleteWeekById(b.dataset.id));
}

function allSales(){ const out=[]; [...state.weeks].reverse().forEach(w=> w.sales.forEach(s=> out.push({...s, weekLabel:w.label, weekDate:w.date}))); return out; }
function filteredAudit(){ return allSales().filter(s=>{
  if(audFilter.raid!=='all' && s.raid!==audFilter.raid) return false;
  if(audFilter.status!=='all' && s.status!==audFilter.status) return false;
  if(audFilter.q){ const q=audFilter.q.toLowerCase(); if(!((s.buyer||'').toLowerCase().includes(q)||(s.btag||'').toLowerCase().includes(q)||(s.gold_to||'').toLowerCase().includes(q))) return false; }
  return true;
});}
function renderAuditoria(){
  const c=document.getElementById('content'); const rows=filteredAudit();
  const total=rows.reduce((a,s)=>a+(s.gold||0),0);
  const paid=rows.filter(s=>s.status==='pagado').reduce((a,s)=>a+(s.gold||0),0); const pend=total-paid;
  const byDest={}; rows.forEach(s=>{ const d=(s.gold_to||'— sin destino —'); byDest[d]=(byDest[d]||0)+(s.gold||0); });
  const destRows=Object.entries(byDest).sort((a,b)=>b[1]-a[1]).map(([d,g])=>`<div class="destrow"><span>${esc(d)}</span><span class="g">${fmtGold(g)}</span></div>`).join('') || '<div class="destrow"><span>—</span></div>';
  c.innerHTML=`
   <div class="audbar">
     <select id="fa_raid"><option value="all">Todas las raids</option>${RAID_KEYS.map(k=>`<option value="${k}" ${audFilter.raid===k?'selected':''}>${esc(RAIDS[k].name)}</option>`).join('')}</select>
     <select id="fa_status"><option value="all">Todos los estados</option><option value="reservado" ${audFilter.status==='reservado'?'selected':''}>Reservado</option><option value="senado" ${audFilter.status==='senado'?'selected':''}>Señado</option><option value="pagado" ${audFilter.status==='pagado'?'selected':''}>Pagado</option></select>
     <input id="fa_q" placeholder="Buscar comprador, btag o destino…" value="${esc(audFilter.q)}">
     <span class="spacer"></span>
     <button class="btn ghost sm" id="exportCsv">Exportar CSV</button>
   </div>
   <div class="audsum">
     <div class="stat"><div class="k">Total vendido</div><div class="v gold">${fmtGold(total)}</div></div>
     <div class="stat"><div class="k">Cobrado</div><div class="v ok">${fmtGold(paid)}</div></div>
     <div class="stat"><div class="k">Pendiente de cobro</div><div class="v" style="color:var(--warn)">${fmtGold(pend)}</div></div>
     <div class="stat"><div class="k">Carries (ventas)</div><div class="v">${rows.length}</div></div>
   </div>
   <div class="tablewrap"><table class="aud"><thead><tr>
     <th>Semana</th><th>Raid</th><th>Bosses</th><th>Comprador</th><th>BattleTag</th><th>Gold</th><th>Estado</th><th>Destino del oro</th>
   </tr></thead><tbody>
   ${rows.length? rows.map(s=>{
      const bosses=(s.bosses||[]).length===RAIDS[s.raid].bosses.length?'Clear completo':(s.bosses||[]).join(', ');
      const stLabel={reservado:'Reservado',senado:'Señado',pagado:'Pagado'}[s.status]||s.status;
      return `<tr><td>${esc(s.weekLabel)}<div class="mono" style="font-size:10px">${fmtDate(s.weekDate)}</div></td>
        <td>${esc(RAIDS[s.raid].name)}</td><td>${esc(bosses)}</td><td>${esc(s.buyer)||'—'}</td>
        <td class="mono">${esc(s.btag)||'—'}</td><td class="g">${fmtGold(s.gold)}</td>
        <td><span class="badge ${s.status}">${stLabel}</span></td><td>${esc(s.gold_to)||'<span class="mono">—</span>'}</td></tr>`;
   }).join('') : `<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--muted-2)">Sin resultados con estos filtros.</td></tr>`}
   </tbody></table></div>
   <div class="destbox"><h4>◆ A dónde fue el oro</h4>${destRows}</div>`;
  document.getElementById('fa_raid').onchange=e=>{ audFilter.raid=e.target.value; renderAuditoria(); };
  document.getElementById('fa_status').onchange=e=>{ audFilter.status=e.target.value; renderAuditoria(); };
  document.getElementById('fa_q').oninput=e=>{ audFilter.q=e.target.value; renderAuditoria(); };
  document.getElementById('exportCsv').onclick=exportAuditCSV;
}
function exportAuditCSV(){
  const rows=[['Semana','Fecha','Raid','Bosses','Comprador','BattleTag','Gold','Estado','DestinoDelOro','Notas']];
  filteredAudit().forEach(s=> rows.push([s.weekLabel,s.weekDate,RAIDS[s.raid].name,(s.bosses||[]).join(' | '),s.buyer||'',s.btag||'',s.gold||0,s.status,s.gold_to||'',s.notes||'']));
  const csv=rows.map(r=> r.map(c=> '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='auditoria-carries.csv'; a.click(); URL.revokeObjectURL(a.href); toast('CSV exportado');
}

async function addWeek(){
  if(!isAdmin()) return;
  const last=state.weeks[state.weeks.length-1]; const base=last?new Date(last.date):new Date(); base.setDate(base.getDate()+7);
  const w={ id:uid(), label:"Lockout "+fmtDate(base), date:base.toISOString().slice(0,10), slots: last? JSON.parse(JSON.stringify(last.slots)) : blankSlots() };
  try{ await sbInsert('weeks', w); await refresh(); state.current=w.id; view='semana'; render(); toast('Nueva semana creada'); }catch(e){ toast('No se pudo crear'); }
}
async function renameWeek(){
  if(!isAdmin()) return; const w=curWeek(); if(!w) return;
  const nl=prompt('Nombre de la semana:', w.label); if(nl===null) return;
  const nd=prompt('Fecha de reset (AAAA-MM-DD):', w.date)||w.date;
  try{ await sbUpdate('weeks', w.id, { label:nl.trim()||w.label, date:nd }); await refresh(); render(); toast('Semana actualizada'); }catch(e){ toast('No se pudo'); }
}
function deleteWeek(){ const w=curWeek(); if(w) deleteWeekById(w.id); }
async function deleteWeekById(id){
  if(!isAdmin()) return; const w=state.weeks.find(x=>x.id===id); if(!w) return;
  if(!confirm('¿Borrar "'+w.label+'" y todas sus ventas? No se puede deshacer.')) return;
  try{ await sbDelete('weeks', id); await refresh(); render(); toast('Semana borrada'); }catch(e){ toast('No se pudo borrar'); }
}

function buildBossPicker(raidKey, selected){
  const w=curWeek(); const box=document.getElementById('f_bosses');
  box.innerHTML=RAIDS[raidKey].bosses.map(b=>{
    const total=(w.slots[raidKey]||{})[b]??DEFAULT_SLOTS; let sold=soldFor(w,raidKey,b);
    if(editingId){ const ex=w.sales.find(s=>s.id===editingId); if(ex&&ex.raid===raidKey&&(ex.bosses||[]).includes(b)) sold-=1; }
    const left=total-sold; const full=left<=0; const checked=selected.includes(b);
    return `<div class="pkrow"><label class="cb ${checked?'has':''}"><input type="checkbox" value="${esc(b)}" ${checked?'checked':''}><span>${esc(b)}</span></label>${full?`<span class="full">lleno</span>`:`<span class="full" style="color:var(--muted-2)">${left} libre${left>1?'s':''}</span>`}</div>`;
  }).join('');
  box.querySelectorAll('input[type=checkbox]').forEach(cb=> cb.onchange=()=> cb.closest('label').classList.toggle('has', cb.checked));
}
function openSale(id){
  if(!state.current){ toast('Primero tiene que existir una semana'); return; }
  editingId=id; const w=curWeek(); const sel=document.getElementById('f_raid');
  sel.innerHTML=RAID_KEYS.map(k=>`<option value="${k}">${esc(RAIDS[k].name)}</option>`).join('');
  let data={ raid:RAID_KEYS[0], buyer:'', btag:'', bosses:[], gold:0, status:'reservado', gold_to:'', notes:'' };
  if(id){ const ex=w.sales.find(s=>s.id===id); if(ex) data={...ex}; }
  document.getElementById('modalTitle').textContent=id?'Editar venta':'Registrar venta';
  sel.value=data.raid;
  document.getElementById('f_buyer').value=data.buyer||'';
  document.getElementById('f_btag').value=data.btag||'';
  document.getElementById('f_gold').value=data.gold?data.gold:'';
  document.getElementById('f_status').value=data.status||'reservado';
  document.getElementById('f_goldto').value=data.gold_to||'';
  document.getElementById('f_notes').value=data.notes||'';
  buildBossPicker(data.raid, data.bosses||[]);
  sel.onchange=()=> buildBossPicker(sel.value, []);
  document.getElementById('scrim').classList.add('on');
  setTimeout(()=>document.getElementById('f_buyer').focus(),50);
}
function closeSale(){ document.getElementById('scrim').classList.remove('on'); editingId=null; }
async function saveSaleFn(){
  const w=curWeek(); const raid=document.getElementById('f_raid').value;
  const bosses=[...document.querySelectorAll('#f_bosses input:checked')].map(c=>c.value);
  if(!bosses.length){ toast('Elegí al menos un boss'); return; }
  const rec={ id: editingId||uid(), week_id:w.id, raid,
    buyer:document.getElementById('f_buyer').value.trim(), btag:document.getElementById('f_btag').value.trim(),
    bosses, gold:parseGold(document.getElementById('f_gold').value), status:document.getElementById('f_status').value,
    gold_to:document.getElementById('f_goldto').value.trim(), notes:document.getElementById('f_notes').value.trim() };
  try{ if(editingId) await sbUpdate('sales', editingId, rec); else await sbInsert('sales', rec);
    closeSale(); await refresh(); toast(editingId?'Venta actualizada':'Venta registrada');
  }catch(e){ toast('No se pudo guardar (¿falta la columna gold_to?)'); setLive('err','error'); }
}
async function delSale(id){ try{ await sbDelete('sales', id); await refresh(); toast('Venta eliminada'); }catch(e){ toast('No se pudo borrar'); } }

function copyText(t){ if(navigator.clipboard){ navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t)); } else fallbackCopy(t); }
function fallbackCopy(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); }
function copyVacancies(){
  const w=curWeek(); if(!w){ toast('No hay semana activa'); return; }
  let lines=[`WTS Carries Míticos — ${w.label}  ·  PROTOTYPE (US-Quel'Thalas)`];
  RAID_KEYS.forEach(k=>{ const open=RAIDS[k].bosses.map(b=>{ const v=((w.slots[k]||{})[b]??DEFAULT_SLOTS)-soldFor(w,k,b); return v>0?`${b} (${v})`:null; }).filter(Boolean);
    if(open.length) lines.push(`\n${RAIDS[k].name}: `+open.join(' · ')); });
  if(lines.length===1) lines.push('\nSin vacantes abiertas — todo vendido.');
  copyText(lines.join('')); toast('Vacantes copiadas');
}
function exportBackup(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='carry-tracker-respaldo.json'; a.click(); URL.revokeObjectURL(a.href); toast('Respaldo descargado'); }

document.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{ view=t.dataset.view; render(); });
document.getElementById('saveSale').onclick=saveSaleFn;
document.getElementById('cancelSale').onclick=closeSale;
document.getElementById('scrim').onclick=(e)=>{ if(e.target.id==='scrim') closeSale(); };
document.getElementById('pickAll').onclick=()=>{ document.querySelectorAll('#f_bosses input[type=checkbox]').forEach(cb=>{ cb.checked=true; cb.closest('label').classList.add('has'); }); };
document.getElementById('copyVacAll').onclick=copyVacancies;
document.getElementById('exportBtn').onclick=exportBackup;
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeSale(); document.getElementById('scrimPin').classList.remove('on'); } });

document.getElementById('adminBtn').onclick=()=>{
  if(isAdmin()){ if(confirm('¿Salir del modo admin?')) setAdmin(false); }
  else{ document.getElementById('scrimPin').classList.add('on'); setTimeout(()=>document.getElementById('pinInput').focus(),50); }
};
document.getElementById('cancelPin').onclick=()=> document.getElementById('scrimPin').classList.remove('on');
document.getElementById('scrimPin').onclick=(e)=>{ if(e.target.id==='scrimPin') e.currentTarget.classList.remove('on'); };
function tryPin(){ const v=document.getElementById('pinInput').value; if(v===ADMIN_PIN){ document.getElementById('scrimPin').classList.remove('on'); document.getElementById('pinInput').value=''; setAdmin(true); toast('Modo admin activado'); } else toast('PIN incorrecto'); }
document.getElementById('okPin').onclick=tryPin;
document.getElementById('pinInput').addEventListener('keydown',e=>{ if(e.key==='Enter') tryPin(); });

function showSetup(){
  document.getElementById('content').innerHTML=`<div class="setup"><h2>Falta conectar la base de datos</h2>
    <p>Configurá Supabase una sola vez para compartir datos en vivo:</p>
    <ol><li>Creá un proyecto en <code>supabase.com</code>.</li>
    <li>En <b>SQL Editor</b> pegá el SQL que te pasó Claude (crea las tablas).</li>
    <li>En <b>Connect</b> copiá <code>Project URL</code> y <code>Publishable key</code>.</li>
    <li>Pegalos arriba del archivo en <code>SUPABASE_URL</code> y <code>SUPABASE_KEY</code>, y poné tu <code>ADMIN_PIN</code>.</li>
    <li>Guardá y subilo a tu hosting.</li></ol></div>`;
  setLive('err','sin configurar');
}
async function boot(){
  renderAdminBtn();
  if(!configured()){ showSetup(); return; }
  await refresh(); await ensureFirstWeek(); render(); lastSig=dataSig();
  setInterval(()=>{ if(canRefresh()) refresh(true); }, 4000);
}
boot();
</script>
